name: Build Desktop App

on:
  push:
    branches: [main]
    paths:
      - 'electron-app/**'

  # Manual trigger from GitHub Actions tab
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: electron-app/package.json

      - name: Install dependencies
        working-directory: electron-app
        run: npm install

      - name: Build .exe
        working-directory: electron-app
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
          CSC_LINK: ''
          WIN_CSC_LINK: ''
        run: npx electron-builder --win --publish never

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: desktop-latest
          name: "Aether Codex Desktop (latest)"
          body: |
            ## Aether Codex Desktop App

            ### Install
            Download **Aether-Codex-Setup.exe** and run it.
            > Windows may show a SmartScreen warning — click **More info → Run anyway**. This is normal for unsigned personal apps.

            ### Shortcuts
            | Shortcut | Action |
            |---|---|
            | `Ctrl+Alt+Space` | Open full app |
            | `Ctrl+Alt+N` | Open quick clipboard |
            | Tray icon click | Toggle app |

            ### Updates
            Web changes (new features, fixes) → no reinstall needed, the app loads live from GitHub Pages automatically.
            Desktop shell changes (main.js / mini.html) → download and reinstall this .exe.
          files: electron-app/dist/Aether-Codex-Setup.exe
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
