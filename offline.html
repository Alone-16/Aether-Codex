<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline - Aether Codex</title>
  <style>
    :root {
      --bg: #000000;
      --tx: #f8fafc;
      --ac: #a78bfa;
      --surf: #0f1115;
    }
    body {
      background: var(--bg);
      color: var(--tx);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      text-align: center;
      padding: 20px;
    }
    .card {
      background: var(--surf);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 40px;
      max-width: 400px;
      width: 100%;
    }
    h1 {
      color: var(--ac);
      font-size: 24px;
      margin-bottom: 10px;
      margin-top: 0;
    }
    p {
      color: #888;
      font-size: 15px;
      line-height: 1.5;
      margin-bottom: 24px;
    }
    button {
      background: var(--ac);
      color: #000;
      border: none;
      border-radius: 6px;
      padding: 10px 20px;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>You are offline</h1>
    <p>We couldn't reach the network and you don't have this page cached yet. Please check your connection and try again.</p>
    <button onclick="window.location.reload()">Retry</button>
  </div>
</body>
</html>
