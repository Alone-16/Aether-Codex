<!DOCTYPE html>
<html lang="en" data-section="home">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Aether Codex</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Outfit:wght@300;400;500;600;700&family=Orbitron:wght@400;600;700;900&family=Rajdhani:wght@400;500;600;700&family=Bangers&family=Comic+Neue:wght@400;700&display=swap" rel="stylesheet">
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
/* ═══ THEMES ═══ */
[data-section="home"]{--ac:#34d399;--ac2:#10b981;--ac-rgb:52,211,153;--bg:#070d0b;--surf:#0d1512;--surf2:#121f1a;--surf3:#172620;--brd:#1e3329;--brd2:#2a4a3a;--tx:#e8f5f0;--tx2:#7aab95;--mu:#3a5a4a;--sh:0 4px 24px rgba(0,0,0,.6);--fd:'Cinzel',serif;--fb:'Outfit',sans-serif;--cr:10px;--glow:0 0 20px rgba(52,211,153,.2)}
[data-section="media"]{--ac:#e879a0;--ac2:#be185d;--ac-rgb:232,121,160;--bg:#07000f;--surf:#0f0318;--surf2:#160523;--surf3:#1e0830;--brd:#2d0f45;--brd2:#4a1870;--tx:#f0e8ff;--tx2:#a87bc8;--mu:#4a2870;--sh:0 4px 24px rgba(0,0,0,.7);--fd:'Rajdhani',sans-serif;--fb:'Outfit',sans-serif;--cr:4px;--glow:0 0 20px rgba(232,121,160,.25)}
[data-section="games"]{--ac:#f59e0b;--ac2:#d97706;--ac-rgb:245,158,11;--bg:#080600;--surf:#100e00;--surf2:#1a1500;--surf3:#241d00;--brd:#332800;--brd2:#4d3c00;--tx:#fff8e6;--tx2:#c8a84a;--mu:#5a4a1a;--sh:0 4px 24px rgba(0,0,0,.7);--fd:'Orbitron',monospace;--fb:'Outfit',sans-serif;--cr:2px;--glow:0 0 24px rgba(245,158,11,.2)}
[data-section="books"]{--ac:#7c3aed;--ac2:#6d28d9;--ac-rgb:124,58,237;--bg:#f5f0e8;--surf:#faf7f2;--surf2:#f0ebe0;--surf3:#e8e0d0;--brd:#1a1a2e;--brd2:#374151;--tx:#1a1a2e;--tx2:#374151;--mu:#9ca3af;--sh:4px 4px 0 #1a1a2e;--fd:'Bangers',cursive;--fb:'Comic Neue',cursive;--cr:8px;--glow:4px 4px 0 rgba(124,58,237,.4)}
[data-section="music"]{--ac:#fb923c;--ac2:#ea580c;--ac-rgb:251,146,60;--bg:#080400;--surf:#120800;--surf2:#1c1000;--surf3:#261800;--brd:#382200;--brd2:#503200;--tx:#fff4e6;--tx2:#c8844a;--mu:#5a3a1a;--sh:0 4px 24px rgba(0,0,0,.7);--fd:'Outfit',sans-serif;--fb:'Outfit',sans-serif;--cr:12px;--glow:0 0 24px rgba(251,146,60,.2)}
[data-section="settings"]{--ac:#8888aa;--ac2:#666688;--ac-rgb:136,136,170;--bg:#0a0a12;--surf:#111118;--surf2:#18181f;--surf3:#202028;--brd:#2a2a3a;--brd2:#383848;--tx:#eeedf8;--tx2:#8888aa;--mu:#44445a;--sh:0 4px 24px rgba(0,0,0,.5);--fd:'Cinzel',serif;--fb:'Outfit',sans-serif;--cr:8px;--glow:none}

/* ═══ RESET ═══ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:var(--fb);background:var(--bg);color:var(--tx);font-size:14px;-webkit-font-smoothing:antialiased;transition:background .35s,color .35s}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--brd2);border-radius:2px}
button{cursor:pointer;font-family:inherit;border:none;background:none}
input,select,textarea{font-family:inherit;color:var(--tx)}

/* ═══ LAYOUT ═══ */
#app{display:flex;height:100vh;overflow:hidden}

/* ═══ SIDEBAR ═══ */
#sidebar{width:60px;background:var(--surf);border-right:1px solid var(--brd);display:flex;flex-direction:column;align-items:center;padding:12px 0;gap:4px;flex-shrink:0;z-index:200;transition:background .35s,border-color .35s}
.sb-logo{font-family:var(--fd);font-size:16px;font-weight:700;color:var(--ac);width:40px;height:40px;display:flex;align-items:center;justify-content:center;margin-bottom:8px;text-shadow:var(--glow);transition:color .35s,text-shadow .35s}
.sb-sep{width:30px;height:1px;background:var(--brd);margin:4px 0;transition:background .35s}
.ni{width:44px;height:44px;border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;color:var(--tx2);cursor:pointer;transition:all .2s;position:relative}
.ni:hover{background:var(--surf2);color:var(--tx)}
.ni.active{background:rgba(var(--ac-rgb),.12);color:var(--ac);box-shadow:inset 0 0 0 1px rgba(var(--ac-rgb),.25)}
.ni .ni-ico{font-size:18px;line-height:1}
.ni .ni-lbl{font-size:8px;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.ni.active::before{content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);width:3px;height:24px;background:var(--ac);border-radius:0 2px 2px 0;box-shadow:var(--glow)}
.ni[data-tip]::after{content:attr(data-tip);position:absolute;left:calc(100% + 12px);top:50%;transform:translateY(-50%);background:var(--surf3);color:var(--tx);padding:5px 10px;border-radius:5px;font-size:12px;font-weight:600;white-space:nowrap;opacity:0;pointer-events:none;transition:opacity .15s;border:1px solid var(--brd2);z-index:999;font-family:var(--fb)}
.ni:hover[data-tip]::after{opacity:1}
.sb-bot{margin-top:auto;display:flex;flex-direction:column;gap:4px;align-items:center}

/* ═══ MAIN ═══ */
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}

/* ═══ NAVBAR ═══ */
#navbar{height:50px;background:var(--surf);border-bottom:1px solid var(--brd);display:flex;align-items:center;padding:0 14px;gap:8px;flex-shrink:0;transition:background .35s,border-color .35s}
#hbg{display:none;width:34px;height:34px;border-radius:7px;background:var(--surf2);border:1px solid var(--brd);color:var(--tx2);font-size:15px;align-items:center;justify-content:center;flex-shrink:0}
.nb-title{font-family:var(--fd);font-size:14px;font-weight:700;color:var(--ac);letter-spacing:.5px;white-space:nowrap;text-shadow:var(--glow);transition:color .35s,text-shadow .35s}
.nb-divider{width:1px;height:18px;background:var(--brd);flex-shrink:0}
.nb-section{font-size:12px;color:var(--tx2)}
.srch-wrap{flex:1;max-width:340px;position:relative;margin-left:2px}
.srch{width:100%;background:var(--surf2);border:1px solid var(--brd);border-radius:6px;padding:6px 10px 6px 30px;font-size:13px;color:var(--tx);outline:none;transition:border-color .15s}
.srch:focus{border-color:var(--ac)}
.srch::placeholder{color:var(--mu)}
.srch-ico{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--mu);font-size:13px;pointer-events:none}
.nb-r{display:flex;align-items:center;gap:5px;margin-left:auto}
.nb-btn{height:30px;border-radius:5px;background:var(--surf2);border:1px solid var(--brd);color:var(--tx2);font-size:11px;font-weight:600;padding:0 9px;display:flex;align-items:center;gap:4px;transition:all .15s;white-space:nowrap}
.nb-btn:hover{background:var(--surf3);color:var(--tx);border-color:var(--brd2)}
.nb-btn.ac{background:rgba(var(--ac-rgb),.12);border-color:rgba(var(--ac-rgb),.3);color:var(--ac)}
.nb-btn.ac:hover{background:rgba(var(--ac-rgb),.2)}
.nb-ico{width:30px;height:30px;border-radius:50%;background:var(--surf2);border:1px solid var(--brd);color:var(--tx2);font-size:14px;display:flex;align-items:center;justify-content:center;transition:all .15s}
.nb-ico:hover{background:var(--surf3)}

/* ═══ CONTENT ═══ */
#content{flex:1;overflow-y:auto;padding:20px;transition:opacity .18s}
#content.fade{opacity:0}

/* ═══ FILTERBAR (media) ═══ */
#filterbar{background:var(--surf);border-bottom:1px solid var(--brd);padding:6px 14px;display:flex;align-items:center;gap:8px;flex-shrink:0;transition:background .35s,border-color .35s}
.fsel{background:var(--surf2);border:1px solid var(--brd);border-radius:5px;padding:5px 9px;font-size:12px;color:var(--tx2);outline:none;cursor:pointer}
.fsel:focus{border-color:var(--ac)}
.cnt-lbl{font-size:12px;color:var(--mu);margin-left:4px}

/* ═══ SUB-TABS ═══ */
.sub-tabs{display:flex;gap:3px;background:var(--surf);border:1px solid var(--brd);border-radius:7px;padding:3px;flex-wrap:wrap}
.stab{padding:5px 13px;border-radius:4px;font-size:12px;font-weight:600;color:var(--tx2);transition:all .15s;white-space:nowrap}
.stab:hover{background:var(--surf2);color:var(--tx)}
.stab.active{background:rgba(var(--ac-rgb),.15);color:var(--ac)}

/* ═══ STATUS TAGS ═══ */
.stag{display:inline-flex;align-items:center;padding:2px 7px;border-radius:20px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.3px}
.st-watching{background:rgba(56,189,248,.12);color:#38bdf8}
.st-completed{background:rgba(74,222,128,.12);color:#4ade80}
.st-on_hold{background:rgba(251,191,36,.12);color:#fbbf24}
.st-dropped{background:rgba(251,113,133,.12);color:#fb7185}
.st-plan{background:rgba(167,139,250,.12);color:#a78bfa}
.st-upcoming{background:rgba(251,146,60,.12);color:#fb923c}
.st-not_started{background:var(--surf3);color:var(--mu)}

/* ═══ LIST ═══ */
.ss-section{margin-bottom:18px}
.ss-head{display:flex;align-items:center;gap:10px;margin-bottom:5px;padding:0 2px;cursor:pointer;user-select:none}
.ss-lbl{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:1.4px}
.ss-cnt{font-size:10px;font-weight:700;color:var(--mu)}
.ss-line{flex:1;height:1px;background:var(--brd)}
.ss-arr{font-size:10px;color:var(--mu);transition:transform .2s}
.ss-arr.coll{transform:rotate(-90deg)}
.ss-rows{display:flex;flex-direction:column;gap:2px}
.ss-rows.coll{display:none}

.row{display:flex;align-items:center;background:var(--surf);border:1px solid var(--brd);padding:0 10px 0 0;transition:border-color .12s,background .12s;cursor:pointer;min-height:44px}
.row:hover{border-color:var(--brd2)}
.row.active-row{background:rgba(var(--ac-rgb),.05);border-color:rgba(var(--ac-rgb),.3)}
.row-bar{width:3px;min-height:44px;flex-shrink:0;align-self:stretch}
.row-info{flex:1;min-width:0;padding:9px 9px 9px 11px}
.row-title{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.3}
.row-meta{display:flex;align-items:center;gap:7px;margin-top:3px;flex-wrap:wrap}
.row-r{display:flex;align-items:center;gap:5px;flex-shrink:0;padding:0 3px}
.row-prog{display:flex;align-items:center;gap:5px}
.prog-bar{width:55px;height:3px;background:var(--surf3);border-radius:2px;overflow:hidden}
.prog-fill{height:100%;border-radius:2px;transition:width .3s}
.prog-txt{font-size:11px;color:var(--mu);white-space:nowrap}
.row-btns{display:flex;align-items:center;gap:2px}
.rbt{width:24px;height:24px;border-radius:4px;background:var(--surf2);border:1px solid var(--brd);color:var(--tx2);font-size:11px;display:flex;align-items:center;justify-content:center;transition:all .12s;flex-shrink:0}
.rbt:hover{background:var(--surf3);color:var(--tx)}
.rbt.del:hover{background:rgba(251,113,133,.1);color:#fb7185;border-color:rgba(251,113,133,.3)}
.ep-inline{display:flex;align-items:center;gap:3px}
.ep-pm{width:20px;height:20px;border-radius:3px;background:var(--surf2);border:1px solid var(--brd);color:var(--tx2);font-size:13px;font-weight:700;display:flex;align-items:center;justify-content:center;transition:all .12s}
.ep-pm:hover{background:rgba(var(--ac-rgb),.12);color:var(--ac);border-color:rgba(var(--ac-rgb),.3)}
.ep-val{font-size:12px;font-weight:700;min-width:16px;text-align:center}
.tl-pill{font-size:9px;font-weight:800;text-transform:uppercase;padding:1px 5px;border-radius:3px;background:var(--surf3);color:var(--tx2);flex-shrink:0}

/* ═══ RIGHT PANEL ═══ */
#poverlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:299;opacity:0;pointer-events:none;transition:opacity .25s}
#poverlay.show{opacity:1;pointer-events:all}
#rpanel{position:fixed;top:0;right:0;width:420px;height:100vh;background:var(--surf);border-left:1px solid var(--brd);z-index:300;transform:translateX(100%);transition:transform .25s cubic-bezier(.4,0,.2,1),background .35s,border-color .35s;display:flex;flex-direction:column;overflow:hidden}
#rpanel.open{transform:translateX(0)}
#panel-inner{flex:1;overflow-y:auto;display:flex;flex-direction:column}
#content.pushed{margin-right:420px}
.ph{padding:14px 16px;border-bottom:1px solid var(--brd);background:var(--surf);position:sticky;top:0;z-index:10;display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
.ph-title{font-family:var(--fd);font-size:15px;font-weight:600;line-height:1.3;flex:1}
.ph-close{width:26px;height:26px;border-radius:50%;background:var(--surf2);border:1px solid var(--brd);color:var(--tx2);font-size:14px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}
.ph-close:hover{background:var(--surf3)}
.pbadges{display:flex;gap:5px;flex-wrap:wrap;margin-top:5px}
.pstats{display:grid;grid-template-columns:repeat(4,1fr);border-bottom:1px solid var(--brd)}
.pstat{padding:9px 12px;text-align:center}
.pstat-v{font-family:var(--fd);font-size:15px;font-weight:600;line-height:1}
.pstat-l{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--mu);margin-top:3px}
.pprog{height:3px;background:var(--surf3);border-radius:2px;overflow:hidden;margin:4px 0 0}
.pprog-fill{height:100%;border-radius:2px;background:var(--ac);transition:width .3s}
.sec-div{display:flex;align-items:center;gap:8px;padding:12px 16px 6px}
.sec-div-lbl{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:1.2px;color:var(--mu)}
.sec-div-line{flex:1;height:1px;background:var(--brd)}
.sec-div-hint{font-size:10px;color:var(--mu)}
.tl-wrap{padding:0 16px 8px}
.tl-item{display:flex;align-items:center;gap:9px;background:var(--surf2);border:1px solid var(--brd);border-radius:var(--cr);padding:9px 11px;margin-bottom:5px;transition:border-color .15s;cursor:grab;position:relative}
.tl-item.tl-cur{background:rgba(var(--ac-rgb),.06);border-color:rgba(var(--ac-rgb),.25)}
.tl-item.tl-mov{border-left:3px solid #f472b6}
.tl-item.drag-over{border-color:var(--ac);background:rgba(var(--ac-rgb),.08)}
.tl-item.dragging{opacity:.4}
.tl-drag{color:var(--mu);font-size:13px;flex-shrink:0;padding:1px 3px;user-select:none}
.tl-type-pill{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;padding:2px 6px;border-radius:3px;flex-shrink:0}
.tp-s{background:var(--surf3);color:var(--tx2)}
.tp-m{background:rgba(244,114,182,.12);color:#f472b6}
.tl-info{flex:1;min-width:0}
.tl-name{font-size:13px;font-weight:600;color:var(--tx);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tl-sub{font-size:11px;color:var(--mu);margin-top:2px;display:flex;align-items:center;gap:7px;flex-wrap:wrap}
.tl-r{display:flex;flex-direction:column;align-items:flex-end;gap:3px;flex-shrink:0}
.tl-ep{font-size:11px;color:var(--tx2);white-space:nowrap}
.mini-bar{width:65px;height:3px;background:var(--surf3);border-radius:2px;overflow:hidden}
.mini-fill{height:100%;border-radius:2px}
.ep-ctrl{display:flex;align-items:center;gap:4px}
.ep-ctrl-pm{width:20px;height:20px;border-radius:4px;background:var(--surf3);border:1px solid var(--brd);color:var(--tx2);font-size:13px;font-weight:700;display:flex;align-items:center;justify-content:center;transition:all .12s}
.ep-ctrl-pm:hover{background:rgba(var(--ac-rgb),.12);color:var(--ac);border-color:rgba(var(--ac-rgb),.3)}
.ep-num{font-size:12px;font-weight:600;min-width:18px;text-align:center}
.pnotes{padding:0 16px 12px}
.pnotes-box{background:var(--surf2);border:1px solid var(--brd);border-radius:5px;padding:9px 11px;font-size:12px;color:var(--tx2);line-height:1.6;font-style:italic}
.panel-actions{padding:12px 16px;display:flex;gap:7px;border-top:1px solid var(--brd);margin-top:auto}
.btn-del{background:rgba(251,113,133,.08);color:#fb7185;border:1px solid rgba(251,113,133,.2);border-radius:5px;padding:7px 14px;font-size:13px;font-weight:600;transition:all .15s;margin-right:auto}
.btn-del:hover{background:rgba(251,113,133,.15)}
.btn-cancel{background:var(--surf2);color:var(--tx2);border:1px solid var(--brd);border-radius:5px;padding:7px 14px;font-size:13px;font-weight:500;transition:all .15s}
.btn-cancel:hover{background:var(--surf3)}
.btn-save{background:var(--ac);color:#000;border-radius:5px;padding:7px 18px;font-size:13px;font-weight:700;transition:opacity .15s}
.btn-save:hover{opacity:.85}

/* ═══ FORM ═══ */
.form-wrap{padding:14px 16px;flex:1;overflow-y:auto;min-height:0}
.fg{margin-bottom:12px}
.fg-row{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.flbl{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;color:var(--tx2);margin-bottom:4px;display:block}
.fin{background:var(--surf2);border:1px solid var(--brd);border-radius:5px;padding:7px 9px;font-size:13px;color:var(--tx);outline:none;width:100%;transition:border-color .15s}
.fin:focus{border-color:var(--ac)}
textarea.fin{resize:vertical;min-height:60px}
.f-sec{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.8px;color:var(--mu);margin:12px 0 8px;padding-top:12px;border-top:1px solid var(--brd)}
.ftl-item{background:var(--surf2);border:1px solid var(--brd);border-radius:5px;padding:9px;margin-bottom:5px;position:relative}
.ftl-item.drag-over{border-color:var(--ac);background:rgba(var(--ac-rgb),.08)}
.ftl-item.dragging{opacity:.4}
.ftl-head{display:flex;align-items:center;gap:7px;margin-bottom:7px}
.ftl-drag{color:var(--mu);cursor:grab;font-size:13px;padding:0 3px}
.ftl-rm{position:absolute;top:7px;right:7px;width:20px;height:20px;border-radius:3px;background:none;border:1px solid var(--brd);color:var(--mu);font-size:11px;display:flex;align-items:center;justify-content:center;transition:all .12s}
.ftl-rm:hover{background:rgba(251,113,133,.1);color:#fb7185;border-color:rgba(251,113,133,.3)}
.ftl-add-row{display:flex;gap:7px;margin-top:7px}
.ftl-add{flex:1;padding:7px;border:1px dashed var(--brd);border-radius:5px;font-size:12px;color:var(--mu);text-align:center;background:none;transition:all .12s}
.ftl-add:hover{border-color:var(--ac);color:var(--ac);background:rgba(var(--ac-rgb),.06)}
.genre-badge{padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700}

/* ═══ DASH ═══ */
.dash-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:9px;margin-bottom:20px}
.dc{background:var(--surf);border:1px solid var(--brd);border-radius:var(--cr);padding:13px 15px;transition:border-color .2s}
.dc:hover{border-color:var(--brd2)}
.dc-v{font-family:'Cinzel',serif;font-size:clamp(16px,2vw,24px);font-weight:700;line-height:1;color:var(--ac);word-break:break-word}
.dc-l{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--mu);margin-top:4px}
.gm-item{display:flex;align-items:center;gap:9px;padding:8px 12px;font-size:13px;font-weight:500;color:var(--tx2);cursor:pointer;transition:background .1s}
.gm-item:hover,.gm-item.gm-active{background:var(--surf2);color:var(--tx)}
#gdrop-menu.open{display:block!important}
.time-cards{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px}
.tc{background:var(--surf);border:1px solid var(--brd);border-radius:var(--cr);padding:16px 18px}
.quick-links{display:flex;flex-direction:column;gap:10px}
.dash-card{background:var(--surf);border:1px solid var(--brd);border-radius:var(--cr);overflow:hidden}
.dash-card-hd{padding:14px 16px 10px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--brd)}
.dash-card-title{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:var(--mu)}
.dash-card-action{font-size:11px;color:var(--ac);cursor:pointer;font-weight:600}
.dash-card-action:hover{text-decoration:underline}
.dash-card-body{padding:14px 16px}
.ql-card{background:var(--surf2);border:1px solid var(--brd);border-radius:8px;padding:12px 14px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:border-color .2s,transform .15s}
.ql-card:hover{border-color:var(--brd2);transform:translateX(3px)}
.ql-section-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.ql-info{flex:1;min-width:0}
.ql-title{font-size:13px;font-weight:600;color:var(--tx);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ql-meta{font-size:11px;color:var(--tx2);margin-top:2px}
.ql-right{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0}
.ql-badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:4px;white-space:nowrap}
.ql-airing{font-size:10px;color:var(--ac);font-weight:600;white-space:nowrap}
.ql-progress{width:80px;height:3px;background:var(--surf3);border-radius:2px;overflow:hidden}
.ql-progress-fill{height:100%;background:var(--ac);border-radius:2px;transition:width .3s}
.tc-v{font-family:var(--fd);font-size:26px;font-weight:700;line-height:1;color:var(--ac)}
.tc-l{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--mu);margin-top:4px}
.tc-d{font-size:12px;color:var(--tx2);margin-top:4px}
.genre-breakdown{background:var(--surf);border:1px solid var(--brd);border-radius:var(--cr);padding:14px 16px;max-width:480px}
.gb-row{display:flex;align-items:center;gap:9px;padding:7px 0;border-bottom:1px solid var(--brd)}
.gb-row:last-child{border-bottom:none}

/* ═══ UPCOMING ═══ */
.up-card{background:var(--surf);border:1px solid var(--brd);border-radius:var(--cr);padding:12px 14px;display:flex;align-items:center;gap:12px;margin-bottom:7px;transition:border-color .15s;cursor:pointer}
.up-card:hover{border-color:var(--brd2)}
.up-date-box{min-width:44px;text-align:center;background:rgba(251,146,60,.08);border:1px solid rgba(251,146,60,.2);border-radius:5px;padding:7px 5px}
.up-mon{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:#fb923c}
.up-day{font-family:var(--fd);font-size:20px;font-weight:700;line-height:1}
.up-info{flex:1;min-width:0}
.up-title{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.up-sub{font-size:11px;color:var(--tx2);margin-top:2px}
.up-pill{font-size:10px;font-weight:700;padding:3px 9px;border-radius:20px;white-space:nowrap;flex-shrink:0}
.up-past{background:rgba(74,222,128,.1);color:#4ade80}
.up-soon{background:rgba(251,113,133,.1);color:#fb7185}
.up-near{background:rgba(251,191,36,.1);color:#fbbf24}
.up-far{background:var(--surf3);color:var(--mu)}

/* ═══ INCOMPLETE ═══ */
/* reuses .row styles */

/* ═══ EMPTY ═══ */
.empty{text-align:center;padding:50px 20px;color:var(--mu)}
.empty-ico{font-size:32px;opacity:.3;margin-bottom:10px}

/* ═══ PAGE TITLE ═══ */
.page-ttl{font-family:var(--fd);font-size:clamp(20px,3vw,32px);font-weight:700;margin-bottom:18px;color:var(--tx);letter-spacing:1px}
.page-ttl em{color:var(--ac);font-style:normal;text-shadow:var(--glow)}

/* ═══ TOAST ═══ */
.toast-el{position:fixed;bottom:18px;right:18px;z-index:9999;background:var(--surf);border:1px solid var(--brd);border-radius:6px;padding:9px 14px;font-size:13px;font-weight:500;color:var(--tx);box-shadow:var(--sh);pointer-events:none;transition:opacity .3s}

/* ═══ MOBILE SIDEBAR ═══ */
#mob-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:500;opacity:0;pointer-events:none;transition:opacity .25s}
#mob-ov.show{opacity:1;pointer-events:all}
#mob-sb{position:fixed;top:0;left:0;width:230px;height:100vh;background:var(--surf);border-right:1px solid var(--brd);z-index:600;transform:translateX(-100%);transition:transform .3s cubic-bezier(.4,0,.2,1),background .35s;padding:14px 10px;display:flex;flex-direction:column;gap:3px}
#mob-sb.open{transform:translateX(0)}
.mob-logo{font-family:var(--fd);font-size:14px;font-weight:700;color:var(--ac);padding:6px 10px 14px;border-bottom:1px solid var(--brd);margin-bottom:7px}
.mob-ni{display:flex;align-items:center;gap:11px;padding:9px 11px;border-radius:7px;color:var(--tx2);cursor:pointer;transition:all .15s;font-weight:500;font-size:13px}
.mob-ni:hover{background:var(--surf2);color:var(--tx)}
.mob-ni.active{background:rgba(var(--ac-rgb),.12);color:var(--ac)}
.mob-sep{height:1px;background:var(--brd);margin:5px 0}

/* ═══ MEDIA-SPECIFIC DECORATIONS ═══ */
[data-section="media"] .page-ttl{text-transform:uppercase;letter-spacing:3px}
[data-section="media"] .row{clip-path:none}

/* ═══ RESPONSIVE ═══ */
@media(max-width:768px){
  #sidebar{display:none}
  #hbg{display:flex}
  #mob-ov{display:block}
  #content{padding:12px}
  #content.pushed{margin-right:0}
  #rpanel{width:100%;max-width:100%}
  .srch-wrap{max-width:130px}
  .nb-btn span{display:none}
  .fg-row{grid-template-columns:1fr}
  .time-cards{grid-template-columns:1fr}
}
@media(max-width:480px){
  .dash-grid{grid-template-columns:repeat(2,1fr)}
}

<div id="mob-sb">
  <div class="mob-logo">The <em style="color:var(--ac);font-style:normal">Aether Codex</em></div>

  <div class="mob-ni" data-r="media" onclick="nav('media')"><span>◉</span>Media</div>

</div>

<div id="app">
  <nav id="sidebar">
    <div class="sb-logo">AC</div>
    <div class="sb-sep"></div>
    <div class="ni active" data-r="home" data-tip="Home" onclick="nav('home')"><span class="ni-ico">⌂</span><span class="ni-lbl">Home</span></div>

  <div id="main">

      <div class="nb-r">
        <button class="nb-btn ac" id="drive-btn" onclick="driveAction()">☁ <span>Drive</span></button>
        <button class="nb-btn" onclick="exportData()">⬇ <span>Export</span></button>
        <button class="nb-btn" onclick="importFile()">⬆ <span>Import</span></button>

</div>

<div id="poverlay" onclick="closePanel()"></div>
<div id="rpanel"><div id="panel-inner"></div></div>

<script>
'use strict';
// ═══════════════════════════════
//  STORAGE
// ═══════════════════════════════
const K={DATA:'ac_v4_media',GENRES:'ac_v4_genres',THEME:'ac_v4_theme',GENRE:'ac_v4_genre',VER:'ac_v4_ver',SAVED:'ac_v4_saved'};
const DATA_VERSION='4.0';
const ls={get:k=>{try{return JSON.parse(localStorage.getItem(k))}catch{return null}},set:(k,v)=>localStorage.setItem(k,JSON.stringify(v)),str:k=>localStorage.getItem(k),setStr:(k,v)=>localStorage.setItem(k,v),del:k=>localStorage.removeItem(k)};

function loadData(){return ls.get(K.DATA)||[]}
function saveData(d){ls.set(K.DATA,d);ls.setStr(K.SAVED,Date.now())}
function loadGenres(){return ls.get(K.GENRES)||DEFAULT_GENRES()}
function saveGenres(g){ls.set(K.GENRES,g)}
function DEFAULT_GENRES(){return [{"id": "anime", "name": "Anime", "color": "#e879a0"}, {"id": "kdrama", "name": "K-Drama", "color": "#60a5fa"}, {"id": "cdrama", "name": "C-Drama", "color": "#fb923c"}, {"id": "tvshow", "name": "TV Show", "color": "#34d399"}, {"id": "jdrama", "name": "J-Drama", "color": "#a78bfa"}, {"id": "thaidrama", "name": "Thai Drama", "color": "#22d3ee"}, {"id": "webseries", "name": "Web Series", "color": "#818cf8"}, {"id": "cartoon", "name": "Cartoon", "color": "#fbbf24"}, {"id": "manhwa", "name": "Manhwa", "color": "#f97316"}, {"id": "hmanhwa", "name": "HManhwa", "color": "#a3e635"}]}

// ═══════════════════════════════
//  STATE
// ═══════════════════════════════
let DATA=loadData(), GENRES=loadGenres();
let GACTIVE=ls.str(K.GENRE)||'anime';
let CURRENT='home', MEDIA_PAGE='list';
let SEARCH='', PANEL=null, PEDIT=null;
let FORM_TL=[], COLLAPSED={};
let DDRG=null, FDRG=null;

// ═══════════════════════════════
//  UTILS
// ═══════════════════════════════
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2)}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function today(){return new Date().toISOString().slice(0,10)}
function fmtDate(d){if(!d)return'—';return new Date(d+'T00:00:00').toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'})}
function h2r(hex,a){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return`rgba(${r},${g},${b},${a})`}
function gbyid(id){return GENRES.find(g=>g.id===id)||GENRES[0]}
function estTime(eps,dur){if(!eps)return'—';const tot=eps*((parseInt(dur)||24)/60);const h=Math.floor(tot),m=Math.round((tot-h)*60);return h?`~${h}h${m>0?' '+m+'m':''}`:` ~${m}m`}
function fmtMin(min){if(!min)return'—';const d=Math.floor(min/1440),h=Math.floor((min%1440)/60),m=min%60;if(d>0)return`${d}d ${h}h`;if(h>0)return`${h}h${m>0?' '+m+'m':''}`;return`${m}m`}

const SL={watching:'▶ Watching',completed:'✓ Done',on_hold:'⏸ On Hold',dropped:'✗ Dropped',plan:'◻ Planned',upcoming:'◉ Upcoming',not_started:'○ Not Started'};
const SC={watching:'#38bdf8',completed:'#4ade80',on_hold:'#fbbf24',dropped:'#fb7185',plan:'#a78bfa',upcoming:'#fb923c',not_started:'var(--mu)'};
const SO=['watching','plan','not_started','completed','on_hold','dropped','upcoming'];
const SSL={watching:['#38bdf8','WATCHING'],plan:['#a78bfa','PLAN TO WATCH'],not_started:['var(--mu)','NOT STARTED'],completed:['#4ade80','COMPLETED'],on_hold:['#fbbf24','ON HOLD'],dropped:['#fb7185','DROPPED'],upcoming:['#fb923c','UPCOMING']};

function stag(s){return`<span class="stag st-${s}">${SL[s]||s}</span>`}
function pcol(s){return SC[s]||'var(--ac)'}

// ═══════════════════════════════
//  THEME
// ═══════════════════════════════
function applyTheme(t){document.documentElement.setAttribute('data-theme-mode',t);ls.setStr(K.THEME,t);document.getElementById('theme-btn').textContent=t==='dark'?'☀':'🌙'}
function toggleTheme(){applyTheme(ls.str(K.THEME)==='dark'?'light':'dark')}

// ═══════════════════════════════
//  GENRE THEME (Media)
// ═══════════════════════════════
function applyGenre(id){
  GACTIVE=id; ls.setStr(K.GENRE,id);
  const g=gbyid(id); const c=g.color;
  const el=document.documentElement;
  if(CURRENT==='media'){
    el.style.setProperty('--ac',c);
    el.style.setProperty('--ac-rgb',`${parseInt(c.slice(1,3),16)},${parseInt(c.slice(3,5),16)},${parseInt(c.slice(5,7),16)}`);
  }
  buildGenreMenu();
}

function buildGenreMenu(){
  const m=document.getElementById('gdrop-menu'); if(!m) return;
  m.innerHTML=GENRES.map(g=>`
    <div class="gm-item${g.id===GACTIVE?' gm-active':''}" onclick="selectGenre('${g.id}')">
      <span style="width:7px;height:7px;border-radius:50%;background:${g.color};flex-shrink:0;display:inline-block"></span>
      <span style="flex:1">${esc(g.name)}</span>
      <input type="color" value="${g.color}" onclick="event.stopPropagation()" onchange="changeGenreColor('${g.id}',this.value)" style="width:16px;height:16px;border-radius:3px;border:1px solid var(--brd);padding:0;cursor:pointer;background:none">
    </div>`).join('')+`
    <div style="height:1px;background:var(--brd);margin:3px 0"></div>
    <div style="padding:7px 9px;display:flex;gap:5px;align-items:center">
      <input id="new-genre-inp" class="fin" placeholder="New genre..." style="flex:1;font-size:12px;padding:4px 7px" onclick="event.stopPropagation()" onkeydown="if(event.key==='Enter')addGenre()">
      <button onclick="event.stopPropagation();addGenre()" style="background:var(--ac);color:#000;border:none;border-radius:4px;padding:4px 9px;font-size:12px;font-weight:700;cursor:pointer">+</button>
    </div>`;
}

function toggleGdrop(e){e.stopPropagation();const m=document.getElementById('gdrop-menu');if(m)m.classList.toggle('open')}
document.addEventListener('click',e=>{const m=document.getElementById('gdrop-menu');const d=document.getElementById('gdrop');if(m&&d&&!d.contains(e.target))m.classList.remove('open')});

function selectGenre(id){
  GACTIVE=id; ls.setStr(K.GENRE,id);
  const g=gbyid(id); const c=g.color;
  document.documentElement.style.setProperty('--ac',c);
  const [r,gg,b]=[parseInt(c.slice(1,3),16),parseInt(c.slice(3,5),16),parseInt(c.slice(5,7),16)];
  document.documentElement.style.setProperty('--ac-rgb',`${r},${gg},${b}`);
  document.getElementById('gdrop-lbl').textContent=g.name;
  document.getElementById('gdot').style.background=c;
  document.getElementById('gdrop-menu').classList.remove('open');
  SEARCH='';document.getElementById('srch').value='';
  document.getElementById('fstatus').value='';
  render();
}

function changeGenreColor(id,color){
  const g=GENRES.find(x=>x.id===id); if(!g)return;
  g.color=color; saveGenres(GENRES);
  if(id===GACTIVE)selectGenre(id); else buildGenreMenu();
}

function addGenre(){
  const inp=document.getElementById('new-genre-inp'); if(!inp)return;
  const name=inp.value.trim(); if(!name)return;
  const id=name.toLowerCase().replace(/[^a-z0-9]/g,'_');
  if(GENRES.find(g=>g.id===id)){inp.value='';return}
  const colors=['#e879a0','#60a5fa','#fb923c','#34d399','#a78bfa','#22d3ee','#fbbf24','#f472b6','#a3e635'];
  GENRES.push({id,name,color:colors[GENRES.length%colors.length]});
  saveGenres(GENRES); inp.value=''; selectGenre(id);
}

// ═══════════════════════════════
//  ROUTER
// ═══════════════════════════════
const SECTION_META={
  home:    {title:'The Aether Codex',label:'Home'},
  media:   {title:'Media Codex',     label:'Media'},
  games:   {title:'Game Codex',      label:'Games'},
  books:   {title:'Book Codex',      label:'Books'},
  music:   {title:'Music Codex',     label:'Music'},
  settings:{title:'Settings',        label:'Settings'},
};

function nav(id,push=true){
  CURRENT=id;
  if(push)history.pushState({},'',' #/'+( id==='home'?'':id));
  const c=document.getElementById('content');
  c.classList.add('fade');
  setTimeout(()=>{
    document.documentElement.setAttribute('data-section',id);
    document.querySelectorAll('.ni').forEach(el=>el.classList.toggle('active',el.dataset.r===id));
    document.querySelectorAll('.mob-ni').forEach(el=>el.classList.toggle('active',el.dataset.r===id));
    const m=SECTION_META[id]||{title:id,label:id};
    document.getElementById('nb-title').textContent=m.title;
    document.getElementById('nb-sec').textContent=m.label;
    const srch=document.getElementById('srch');
    srch.placeholder=id==='home'?'Search everything...':`Search ${m.label}...`;
    document.getElementById('filterbar').style.display=id==='media'?'flex':'none';
    // Apply genre CSS vars for media section without triggering a re-render
    if(id==='media'){
      const g=gbyid(GACTIVE); const c2=g.color;
      document.documentElement.style.setProperty('--ac',c2);
      const[r,gg,b]=[parseInt(c2.slice(1,3),16),parseInt(c2.slice(3,5),16),parseInt(c2.slice(5,7),16)];
      document.documentElement.style.setProperty('--ac-rgb',`${r},${gg},${b}`);
    } else {
      // Remove inline overrides so section theme takes over
      document.documentElement.style.removeProperty('--ac');
      document.documentElement.style.removeProperty('--ac-rgb');
    }
    renderPage(id);
    c.classList.remove('fade');
  },150);
  closeMob();
}

window.addEventListener('hashchange',()=>{const h=location.hash.replace('#/','').replace('#','');nav(h||'home',false)});

// ═══════════════════════════════
//  PAGE ROUTER
// ═══════════════════════════════
function renderPage(id){
  const c=document.getElementById('content');
  if(id==='media') renderMedia(c);
  else if(id==='home') renderHome(c);
  else if(id==='settings') renderSettings(c);
  else renderSectionStub(id,c);
}
function render(){renderPage(CURRENT)}

// ═══════════════════════════════
//  HOME DASHBOARD
// ═══════════════════════════════
function renderHome(c){
  const now=new Date();
  const mediaEntries=DATA;
  const totalEps=mediaEntries.reduce((a,e)=>{
    const tl=e.timeline||[];
    if(tl.length)return a+tl.filter(t=>t.type==='season').reduce((s,t)=>s+parseInt(t.epWatched||0),0);
    return a+parseInt(e.epCur||0);
  },0);
  const totalMin=mediaEntries.reduce((a,e)=>{
    const dur=parseInt(e.epDuration||24);
    const tl=e.timeline||[];
    if(tl.length)return a+tl.filter(t=>t.type==='season').reduce((s,t)=>s+parseInt(t.epWatched||0)*dur,0);
    return a+parseInt(e.epCur||0)*dur;
  },0);
  const watching=mediaEntries.filter(e=>e.status==='watching').length;
  const completed=mediaEntries.filter(e=>e.status==='completed').length;

  // Quick links - currently watching
  const activeEntries=mediaEntries.filter(e=>e.status==='watching').slice(0,4);
  const days_=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const todayNum=new Date().getDay();
  const qlItems=activeEntries.map(e=>{
    const st=entryStats(e);
    const g=gbyid(e.genreId);
    const as=activeSeason(e);
    const tl=e.timeline||[];
    // Meta line: season name + ep progress
    let meta='';
    if(tl.length&&as){
      const sName=as.name||`Season ${as.num||''}`;
      const w=parseInt(as.epWatched||0),t=parseInt(as.eps||0);
      meta=`${sName} · Ep ${w}/${t||'?'}`;
    } else {
      meta=`${esc(g.name)} · ${st.cur}/${st.tot||'?'} ep`;
    }
    const pct=st.pct>0?st.pct:(st.tot?2:null);
    const progressBar=pct!=null?`<div class="ql-progress"><div class="ql-progress-fill" style="width:${pct}%"></div></div>`:'';

function renderAiringWidget(){

    const items=airingEntries.filter(e=>e.airingDay===i);

    const itemsHtml=items.length?items.map(e=>{
      const diff=(i-todayN+7)%7;
      return`<div style="background:${isToday?'rgba(var(--ac-rgb),.1)':'var(--surf2)'};border:1px solid ${isToday?'rgba(var(--ac-rgb),.3)':'var(--brd)'};border-radius:4px;padding:4px 5px;font-size:10px;cursor:pointer" title="${e.title} - ${e.airingTime||''}">

      <div style="font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;color:${isToday?'var(--ac)':'var(--mu)'};text-align:center;padding:4px 0">${d}</div>

function renderUpcomingWidget(){
  const now=new Date(); now.setHours(0,0,0,0);
  const items=[];
  DATA.forEach(e=>{
    if(e.upcomingDate)items.push({title:e.title,date:e.upcomingDate,label:'New Release'});
    (e.timeline||[]).forEach(it=>{if(it.upcomingDate)items.push({title:e.title,date:it.upcomingDate,label:it.name||'New Season'})});
  });
  items.sort((a,b)=>new Date(a.date)-new Date(b.date));
  const rows=items.slice(0,5).map(it=>{
    const d=new Date(it.date+'T00:00:00');
    const diff=Math.ceil((d-now)/86400000);
    const mon=d.toLocaleString('default',{month:'short'}).toUpperCase();
    let cls='up-far',lbl=`${diff}d`;
    if(diff<=0){cls='up-past';lbl='Released';}
    else if(diff<=3){cls='up-soon';lbl=`${diff}d left`;}
    else if(diff<=14){cls='up-near';lbl=`${diff}d`;}
    return`<div class="up-card" style="padding:8px 11px">
      <div class="up-date-box"><div class="up-mon">${mon}</div><div class="up-day">${d.getDate()}</div></div>
      <div class="up-info">
        <div class="up-title" style="font-size:12px">${esc(it.title)}</div>
        <div class="up-sub" style="font-size:10px">${esc(it.label)}</div>
      </div>
      <div class="up-pill ${cls}">${lbl}</div>
    </div>`;
  }).join('');
  return`<div style="background:var(--surf);border:1px solid var(--brd);border-radius:var(--cr);overflow:hidden">
    <div style="padding:12px 14px 8px;border-bottom:1px solid var(--brd)">
      <div style="font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:var(--mu)">🗓 Upcoming</div>
    </div>
    <div style="padding:10px">${rows||`<div style="color:var(--mu);font-size:13px;text-align:center;padding:14px">No upcoming items</div>`}</div>
  </div>`;
}

// ─── LIST ───
function filteredData(){
  let d=DATA.filter(e=>e.genreId===GACTIVE);
  if(SEARCH)d=d.filter(e=>e.title.toLowerCase().includes(SEARCH)||(e.timeline||[]).some(it=>(it.name||it.movieTitle||'').toLowerCase().includes(SEARCH)));
  const fst=document.getElementById('fstatus')?.value;
  const fs=document.getElementById('fsort')?.value;
  if(fs==='added')d=[...d].sort((a,b)=>(b.addedAt||0)-(a.addedAt||0));
  else d=[...d].sort((a,b)=>a.title.localeCompare(b.title));
  return{data:d,fst};
}

function expandRows(entries,fst){
  const rows=[];
  entries.forEach(e=>{
    const tl=e.timeline||[];
    if(!tl.length){if(!fst||e.status===fst)rows.push({kind:'entry',e,status:e.status});}
    else tl.forEach((it,idx)=>{const st=it.status||'not_started';if(!fst||st===fst)rows.push({kind:'tl',e,it,idx,status:st});});
  });
  return rows;
}

function renderList(c){
  const {data,fst}=filteredData();
  const flat=expandRows(data,fst);
  const pCount=new Set(flat.map(r=>r.e.id)).size;
  document.getElementById('cnt-lbl').textContent=`${pCount} title${pCount!==1?'s':''} · ${flat.length} part${flat.length!==1?'s':''}`;
  if(!flat.length){c.innerHTML=`<div class="empty"><div class="empty-ico">◌</div><p>No titles here yet</p></div>`;return}
  const byS={};SO.forEach(s=>{byS[s]=flat.filter(r=>r.status===s)});
  let html='';
  SO.forEach(s=>{
    const rows=byS[s]; if(!rows?.length)return;
    const[col,lbl]=SSL[s];
    const coll=COLLAPSED[GACTIVE+'_'+s];
    html+=`<div class="ss-section">
      <div class="ss-head" onclick="toggleColl('${s}')">
        <span class="ss-lbl" style="color:${col}">${lbl}</span>
        <span class="ss-cnt">${rows.length}</span>
        <span class="ss-line" style="background:${col}22"></span>
        <span class="ss-arr${coll?' coll':''}">▾</span>
      </div>
      <div class="ss-rows${coll?' coll':''}">
        ${rows.map(r=>r.kind==='tl'?tlRowHtml(r.e,r.it,r.idx):rowHtml(r.e)).join('')}
      </div>
    </div>`;
  });
  c.innerHTML=html;
}

function toggleColl(s){const k=GACTIVE+'_'+s;COLLAPSED[k]=!COLLAPSED[k];renderMediaBody()}

function entryStats(e){
  const tl=e.timeline||[];const dur=parseInt(e.epDuration)||24;
  if(!tl.length){const cur=parseInt(e.epCur||0),tot=parseInt(e.epTot||0);const pct=tot?Math.round(cur/tot*100):(cur>0?100:0);return{cur,tot,pct,time:estTime(tot||cur,dur)}}
  let cur=0,tot=0;
  tl.forEach(it=>{if(it.type==='season'){cur+=parseInt(it.epWatched||0);tot+=parseInt(it.eps||0)}else if(it.type==='movie'&&it.watched){cur+=1;tot+=1}});
  return{cur,tot,pct:tot?Math.round(cur/tot*100):0,time:estTime(tot,dur)};
}

function activeSeason(e){
  const tl=(e.timeline||[]).filter(it=>it.type==='season');
  return tl.find(it=>it.status==='watching')||tl.find(it=>it.status==='not_started')||tl[tl.length-1]||null;
}

function rowHtml(e){
  const isA=PANEL&&PEDIT===e.id;
  const tl=e.timeline||[];
  const col=pcol(e.status);
  let rCur=0,rTot=0,rPct=0,showCtrl=false;
  if(tl.length){const as=activeSeason(e);if(as&&as.type==='season'){rCur=parseInt(as.epWatched||0);rTot=parseInt(as.eps||0);rPct=rTot?Math.round(rCur/rTot*100):(rCur>0?100:0);showCtrl=['watching','on_hold'].includes(as.status);}}
  else{rCur=parseInt(e.epCur||0);rTot=parseInt(e.epTot||0);rPct=rTot?Math.round(rCur/rTot*100):(rCur>0?100:0);showCtrl=['watching','completed','on_hold','dropped'].includes(e.status);}
  const hasBar=rTot>0||rCur>0;
  const seaC=tl.filter(t=>t.type==='season').length,movC=tl.filter(t=>t.type==='movie').length;
  return`<div class="row${isA?' active-row':''}" id="row-${e.id}" onclick="openDetail('${e.id}')">
    <div class="row-bar" style="background:${col}"></div>
    <div class="row-info">
      <div class="row-title">${esc(e.title)}</div>
      <div class="row-meta">${stag(e.status)}${tl.length?`<span style="font-size:10px;color:var(--mu)">${seaC}S${movC?' + '+movC+'M':''}</span>`:''}</div>
    </div>
    <div class="row-r">
      ${hasBar?`<div class="row-prog"><div class="prog-bar"><div class="prog-fill" style="width:${rPct}%;background:${col}"></div></div><span class="prog-txt">${rCur}${rTot?'/'+rTot:''}</span></div>`:''}
      <div class="row-btns" onclick="event.stopPropagation()">
        ${showCtrl&&hasBar?`<div class="ep-inline"><button class="ep-pm" onclick="quickEp('${e.id}',-1)">−</button><span class="ep-val">${rCur}</span><button class="ep-pm" onclick="quickEp('${e.id}',1)">+</button></div>`:''}
        <button class="rbt" onclick="openEdit('${e.id}')">✏</button>
        <button class="rbt del" onclick="askDel('${e.id}')">✕</button>
      </div>
    </div>
  </div>`;
}

function tlRowHtml(e,it,idx){
  const isA=PANEL&&PEDIT===e.id;
  const isS=it.type==='season';const st=it.status||'not_started';
  const col=pcol(st);const w=parseInt(it.epWatched||0),t=parseInt(it.eps||0);
  const pct=t?Math.round(w/t*100):(w>0?100:0);
  const hasBar=t>0||w>0;const showCtrl=isS&&['watching','on_hold'].includes(st);
  const rawName=isS?(it.name||`Season ${it.num||idx+1}`):(it.movieTitle||it.name||'Movie');
  const fullName=`${e.title} · ${rawName}`;
  const pill=isS?`<span class="tl-pill">S${it.num||idx+1}</span>`:`<span class="tl-pill">🎬</span>`;
  return`<div class="row${isA?' active-row':''}" onclick="openDetail('${e.id}')">
    <div class="row-bar" style="background:${col}"></div>
    <div class="row-info">
      <div class="row-title" style="display:flex;align-items:center;gap:5px">${pill}${esc(fullName)}</div>
      <div class="row-meta">${stag(st)}</div>
    </div>
    <div class="row-r">
      ${hasBar?`<div class="row-prog"><div class="prog-bar"><div class="prog-fill" style="width:${pct}%;background:${col}"></div></div><span class="prog-txt">${w}${t?'/'+t:''}</span></div>`:''}
      <div class="row-btns" onclick="event.stopPropagation()">
        ${showCtrl?`<div class="ep-inline"><button class="ep-pm" onclick="quickTlEp('${e.id}',${idx},-1)">−</button><span class="ep-val">${w}</span><button class="ep-pm" onclick="quickTlEp('${e.id}',${idx},1)">+</button></div>`:''}
        <button class="rbt" onclick="openEdit('${e.id}')">✏</button>
        <button class="rbt del" onclick="askDel('${e.id}')">✕</button>
      </div>
    </div>
  </div>`;
}

// ─── QUICK EP ───
function quickEp(id,delta){
  const e=DATA.find(x=>x.id===id);if(!e)return;
  const tl=e.timeline||[];
  if(tl.length){const as=activeSeason(e);if(as){const w=Math.max(0,parseInt(as.epWatched||0)+delta);as.epWatched=as.eps?Math.min(w,parseInt(as.eps)):w;if(as.eps&&as.epWatched>=parseInt(as.eps)&&as.status==='watching')as.status='completed';}}
  else{e.epCur=Math.max(0,(parseInt(e.epCur)||0)+delta);if(e.epTot&&e.epCur>=parseInt(e.epTot)&&e.status==='watching'){e.status='completed';e.endDate=today();}}
  e.updatedAt=Date.now();saveData(DATA);renderMediaBody();if(PANEL==='detail'&&PEDIT===id)renderDetailPanel(DATA.find(x=>x.id===id));
}

function quickTlEp(eid,idx,delta){
  const e=DATA.find(x=>x.id===eid);if(!e)return;
  const it=e.timeline&&e.timeline[idx];if(!it||it.type!=='season')return;
  const w=Math.max(0,parseInt(it.epWatched||0)+delta);
  it.epWatched=it.eps?Math.min(w,parseInt(it.eps)):w;
  if(it.eps&&it.epWatched>=parseInt(it.eps)&&it.status==='watching'){it.status='completed';if((e.timeline||[]).filter(t=>t.type==='season').every(s=>s.status==='completed'))e.status='completed';}
  e.updatedAt=Date.now();saveData(DATA);renderMediaBody();if(PANEL==='detail'&&PEDIT===eid)renderDetailPanel(e);
}

// ─── DASHBOARD ───
function renderDash(c){
  const d=DATA.filter(e=>e.genreId===GACTIVE);
  const cnt={};d.forEach(e=>{cnt[e.status]=(cnt[e.status]||0)+1});
  let epTotal=0,rSum=0,rN=0,totalMin=0;
  d.forEach(e=>{
    const st=entryStats(e);epTotal+=st.cur;
    const dur=parseInt(e.epDuration||24);
    const tl=e.timeline||[];
    if(tl.length)tl.forEach(it=>{if(it.type==='season')totalMin+=parseInt(it.epWatched||0)*parseInt(it.epDuration||dur);});
    else totalMin+=parseInt(e.epCur||0)*dur;

// ─── UPCOMING ───
function renderUpcoming(c){
  const now=new Date();now.setHours(0,0,0,0);
  const items=[];
  DATA.filter(e=>e.genreId===GACTIVE).forEach(e=>{
    if(e.upcomingDate)items.push({id:e.id,title:e.title,date:e.upcomingDate,time:e.upcomingTime||null,label:'New Release'});
    (e.timeline||[]).forEach(it=>{if(it.upcomingDate)items.push({id:e.id,title:e.title,date:it.upcomingDate,time:it.upcomingTime||null,label:it.name||'New Season'});});
  });
  items.sort((a,b)=>new Date(a.date)-new Date(b.date));
  const rows=items.map(it=>{
    const d=new Date(it.date+'T00:00:00');
    const diff=Math.ceil((d-now)/86400000);
    const mon=d.toLocaleString('default',{month:'short'}).toUpperCase();
    let cls='up-far',lbl=`${diff}d`;
    if(diff<=0){cls='up-past';lbl='Released';}else if(diff<=3){cls='up-soon';lbl=`${diff}d left`;}else if(diff<=14){cls='up-near';lbl=`${diff}d`;}
    return`<div class="up-card" onclick="openDetail('${it.id}')">
      <div class="up-date-box"><div class="up-mon">${mon}</div><div class="up-day">${d.getDate()}</div></div>
      <div class="up-info"><div class="up-title">${esc(it.title)}</div><div class="up-sub">${esc(it.label)}${it.time?' · '+it.time:''}</div></div>
      <div class="up-pill ${cls}">${lbl}</div>
    </div>`;
  }).join('');
  c.innerHTML=`<div style="font-family:var(--fd);font-size:18px;font-weight:700;margin-bottom:16px;letter-spacing:1px;text-transform:uppercase;color:var(--ac)">🗓 Upcoming</div>${rows||`<div class="empty"><div class="empty-ico">📅</div><p>No upcoming items</p></div>`}`;
}

// ─── INCOMPLETE ───
function renderIncomplete(c){

function openPanel(mode,id){
  PANEL=mode;PEDIT=id;
  document.getElementById('rpanel').classList.add('open');
  document.getElementById('poverlay').classList.add('show');
  document.getElementById('content').classList.add('pushed');
  if(mode==='detail'){const e=DATA.find(x=>x.id===id);if(e)renderDetailPanel(e)}
  else if(mode==='add')renderFormPanel(null);
  else if(mode==='edit'){const e=DATA.find(x=>x.id===id);if(e)renderFormPanel(e)}
}
function closePanel(){
  PANEL=null;PEDIT=null;
  document.getElementById('rpanel').classList.remove('open');
  document.getElementById('poverlay').classList.remove('show');
  document.getElementById('content').classList.remove('pushed');
  render();
}
function openDetail(id){openPanel('detail',id)}
function openEdit(id){openPanel('edit',id)}
function openAdd(){openPanel('add',null)}

function tlViewHtml(it,i,eid,parentTitle){
  const isS=it.type==='season';const isCur=isS&&it.status==='watching';

  const pct=t?Math.round(w/t*100):0;const sc=pcol(it.status);
  const rawName=isS?(it.name||`Season ${it.num||i+1}`):(it.movieTitle||it.name||'Movie');
  const fullName=`${parentTitle} · ${rawName}`;
  return`<div class="tl-item${isCur?' tl-cur':''}${!isS?' tl-mov':''}" draggable="true" data-idx="${i}"
    ondragstart="dDragStart(event,${i})" ondragover="dDragOver(event,${i})" ondrop="dDrop(event,${i})" ondragleave="this.classList.remove('drag-over')">
    <span class="tl-drag">⠿</span>

      ${isS&&it.status==='watching'?`<div class="ep-ctrl">
        <button class="ep-ctrl-pm" onclick="panelEp('${eid}',${i},-1)">−</button>
        <span class="ep-num">${w}</span>

function panelEp(eid,idx,delta){
  const e=DATA.find(x=>x.id===eid);if(!e)return;
  const it=e.timeline[idx];if(!it||it.type!=='season')return;
  const w=Math.max(0,parseInt(it.epWatched||0)+delta);
  it.epWatched=it.eps?Math.min(w,parseInt(it.eps)):w;
  if(it.eps&&it.epWatched>=parseInt(it.eps)&&it.status==='watching')it.status='completed';
  e.updatedAt=Date.now();saveData(DATA);renderDetailPanel(e);renderMediaBody();
}


function dDragStart(ev,i){DDRG=i;ev.currentTarget.classList.add('dragging')}
function dDragOver(ev,i){ev.preventDefault();if(DDRG===i)return;ev.currentTarget.classList.add('drag-over')}
function dDrop(ev,i){
  ev.preventDefault();ev.currentTarget.classList.remove('drag-over');
  if(DDRG===null||DDRG===i)return;
  const e=DATA.find(x=>x.id===PEDIT);if(!e)return;
  const item=e.timeline.splice(DDRG,1)[0];e.timeline.splice(i,0,item);
  DDRG=null;saveData(DATA);renderDetailPanel(e);
}
function initDetailDrag(e){
  document.querySelectorAll('#dtl-wrap .tl-item').forEach(el=>{
    el.addEventListener('dragend',()=>{el.classList.remove('dragging');document.querySelectorAll('.tl-item').forEach(x=>x.classList.remove('drag-over'))});
  });
}

function collectFormTl(){
  const items=[];let sNum=0;
  document.querySelectorAll('#ftl-list .ftl-item').forEach(el=>{
    const type=el.dataset.type||'season';const id=el.dataset.id||uid();const isS=type==='season';
    if(isS)sNum++;
    const get=fi=>{const x=el.querySelector(`[data-fi="${fi}"]`);return x?x.value:''};
    const name=get('name'),status=get('status')||'not_started';
    let endDate=get('endDate')||null;if(status==='completed'&&!endDate)endDate=today();
    items.push({id,type,num:isS?sNum:null,name:name||null,movieTitle:!isS?(name||null):null,status,
      eps:isS?(get('eps')||null):null,epWatched:isS?(get('epWatched')||null):null,
      watched:!isS&&status==='completed',
      startDate:get('startDate')||null,endDate,
      rating:get('rating')||null,epDuration:get('epDuration')?parseInt(get('epDuration')):null,
      upcomingDate:get('upcomingDate')||null,upcomingTime:get('upcomingTime')||null,
    });
  });
  return items;
}

function addTlSeason(){
  const cur=collectFormTl();const num=(cur.filter(x=>x.type==='season').length)+1;
  let pf={};
  if(num===1){const ept=document.getElementById('f-ept'),epc=document.getElementById('f-epc');
    if(ept?.value){pf={eps:ept.value||null,epWatched:epc?.value||null,startDate:document.getElementById('f-start')?.value||null,endDate:document.getElementById('f-end')?.value||null,rating:document.getElementById('f-rating')?.value||null,epDuration:document.getElementById('f-epdur')?.value?parseInt(document.getElementById('f-epdur').value):null,status:document.getElementById('f-status')?.value||'not_started'};}}
  cur.push({id:uid(),type:'season',num,name:`Season ${num}`,status:pf.status||'not_started',eps:pf.eps||null,epWatched:pf.epWatched||null,startDate:pf.startDate||null,endDate:pf.endDate||null,rating:pf.rating||null,epDuration:pf.epDuration||null,upcomingDate:null,upcomingTime:null});
  FORM_TL=cur;refreshFtl();
}

function fDrop(ev,i){ev.preventDefault();document.querySelectorAll('.ftl-item').forEach(x=>x.classList.remove('drag-over','dragging'));if(FDRG===null||FDRG===i)return;const c=collectFormTl();const item=c.splice(FDRG,1)[0];c.splice(i,0,item);FORM_TL=c;FDRG=null;refreshFtl()}

function saveEntry(eid){
  const title=document.getElementById('f-title').value.trim();if(!title){alert('Please enter a title');return}
  const existing=eid?DATA.find(x=>x.id===eid):null;
  const tl=collectFormTl();
  const g=f=>{const el=document.getElementById(f);return el?el.value||null:null};
  const airingDayEl=document.getElementById('f-airingday');
  const airingDay=airingDayEl?.value!==''?parseInt(airingDayEl.value):null;
  const entry={
    id:eid||uid(),title,
    genreId:g('f-genre'),status:g('f-status'),
    airingDay: isNaN(airingDay)?null:airingDay,
    airingTime:g('f-airingtime'),
    rewatchCount:document.getElementById('f-rewatch')?.value?parseInt(document.getElementById('f-rewatch').value):null,
    favorite:document.getElementById('f-fav')?.checked||false,
    epCur:document.getElementById('f-epc')?.value||null,
    epTot:document.getElementById('f-ept')?.value||null,
    startDate:g('f-start'),endDate:g('f-end'),
    rating:g('f-rating'),epDuration:document.getElementById('f-epdur')?.value?parseInt(document.getElementById('f-epdur').value):null,
    upcomingDate:existing?.upcomingDate||null,upcomingTime:existing?.upcomingTime||null,
    notes:g('f-notes'),
    timeline:tl,
    addedAt:existing?existing.addedAt:Date.now(),updatedAt:Date.now(),
  };
  if(entry.status==='completed'&&!entry.endDate&&!tl.length)entry.endDate=today();
  if(eid){const i=DATA.findIndex(x=>x.id===eid);DATA[i]=entry;}else DATA.unshift(entry);
  saveData(DATA);closePanel();render();toast('✓ Saved');
}

function askDel(id){
  if(!confirm('Delete this entry?'))return;
  DATA=DATA.filter(x=>x.id!==id);saveData(DATA);closePanel();render();toast('Deleted');
}

function exportData(){
  const payload={version:DATA_VERSION,exported:new Date().toISOString(),data:DATA,genres:GENRES};
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([JSON.stringify(payload,null,2)],{type:'application/json'}));
  a.download='AetherCodex_backup_'+new Date().toISOString().slice(0,10)+'.json';
  a.click();URL.revokeObjectURL(a.href);toast('✓ Backup exported');
}

function importFile(){
  const inp=document.createElement('input');inp.type='file';inp.accept='.json';
  inp.onchange=e=>{const file=e.target.files[0];if(!file)return;
    const r=new FileReader();
    r.onload=ev=>{try{
      const p=JSON.parse(ev.target.result);
      if(!p.data||!Array.isArray(p.data))throw new Error('Invalid file');
      if(!confirm(`Import ${p.data.length} entries? Will merge with current data.`))return;
      const ids=new Set(DATA.map(x=>x.id));
      const fresh=p.data.filter(x=>!ids.has(x.id));
      DATA=DATA.concat(fresh);saveData(DATA);
      if(p.genres){const gids=new Set(GENRES.map(g=>g.id));p.genres.filter(g=>!gids.has(g.id)).forEach(g=>GENRES.push(g));saveGenres(GENRES);}
      render();toast(`✓ Imported ${fresh.length} new entries`);
    }catch(err){toast('✗ '+err.message)}};
    r.readAsText(file);
  };inp.click();
}

  document.body.appendChild(el);
  setTimeout(()=>{el.style.opacity='0';setTimeout(()=>el.remove(),300)},2200);
}
