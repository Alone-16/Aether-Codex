// ── SAVE FILE UPLOAD ──
async function uploadSaveFile(gameTitle, file) {
  try {
    const folderId = await _getOrCreateFolder();
    if (!folderId) return null;
    // Create game-saves subfolder
    const sfRes = await _req(`https://www.googleapis.com/drive/v3/files?q=name='game-saves'+and+'${folderId}'+in+parents+and+mimeType='application/vnd.google-apps.folder'+and+trashed=false&fields=files(id)`);
    let sfId;
    if (sfRes) {
      const sfData = await sfRes.json();
      if (sfData.files?.length) sfId = sfData.files[0].id;
    }
    if (!sfId) {
      const cr = await _req('https://www.googleapis.com/drive/v3/files', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({name:'game-saves', mimeType:'application/vnd.google-apps.folder', parents:[folderId]})
      });
      if (!cr) return null;
      sfId = (await cr.json()).id;
    }
    // Upload file
    const formData = new FormData();
    formData.append('metadata', new Blob([JSON.stringify({name: file.name, parents:[sfId]})], {type:'application/json'}));
    formData.append('file', file);
    const token = _getToken();
    const res = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart', {
      method:'POST', headers:{Authorization:`Bearer ${token}`}, body:formData
    });
    if (!res.ok) return null;
    return (await res.json()).id;
  } catch { return null; }
}

function renderGamesUpcoming(c) {
  const now = new Date(); now.setHours(0,0,0,0);
  const items = GDATA.filter(g=>g.upcomingDate).map(g=>({...g, date:g.upcomingDate}));
  items.sort((a,b)=>new Date(a.date)-new Date(b.date));
  const rows = items.map(g => {
    const d = new Date(g.date+'T00:00:00');
    const diff = Math.ceil((d-now)/86400000);
    const mon = d.toLocaleString('default',{month:'short'}).toUpperCase();
    let cls='up-far',lbl=`${diff}d`;
    if(diff<=0){cls='up-past';lbl='Released';}
    else if(diff<=3){cls='up-soon';lbl=`${diff}d left`;}
    else if(diff<=14){cls='up-near';lbl=`${diff}d`;}
    return `<div class="up-card" onclick="openGameDetail('${g.id}')">
      <div class="up-date-box"><div class="up-mon">${mon}</div><div class="up-day">${d.getDate()}</div></div>

      <div class="up-pill ${cls}">${lbl}</div>

  }).join('');
  c.innerHTML = `<div style="font-family:var(--fd);font-size:18px;font-weight:700;margin-bottom:16px;letter-spacing:2px;text-transform:uppercase;color:var(--ac)">🗓 Upcoming Games</div>

// ── YT OAuth (shares GIS client, adds youtube scope) ──
function initYTAuth() {
  if (!window.google?.accounts?.oauth2) { setTimeout(initYTAuth, 600); return; }
  YT_TOKEN_CLIENT = google.accounts.oauth2.initTokenClient({
    client_id: CLIENT_ID,
    scope: DRIVE_SCOPE + ' ' + YT_SCOPE,
    callback: async resp => {
      if (resp.error) { toast('YouTube auth failed: ' + resp.error, 'var(--cr)'); return; }
      // Store token (reuse drive token storage — same account)
      ls.setStr(K.DTOKEN, resp.access_token);
      ls.setStr(K.DEXP, String(Date.now() + (resp.expires_in - 60) * 1000));
      _updateDriveBtn('syncing');
      await _driveInit();
      await syncYouTubePlaylists();
    }
  });
  YT_READY = true;
  // Auto-sync on open if connected
  if (_isConnected()) syncYouTubePlaylists();
}

// ═══════════════════════════════════════════════════════
//  YOUTUBE SYNC
// ═══════════════════════════════════════════════════════
async function syncYouTubePlaylists() {
  if (YT_SYNCING) return;
  YT_SYNCING = true;
  updateMusicSyncBtn('syncing');

  try {
    const token = _getToken(); if (!token) throw new Error('Not connected');

    // Fetch user's playlists
    const plRes = await fetch(
      'https://www.googleapis.com/youtube/v3/playlists?part=snippet,contentDetails&mine=true&maxResults=50',
      { headers: { Authorization: `Bearer ${token}` } }
    );
    if (!plRes.ok) throw new Error('Failed to fetch playlists');
    const plData = await plRes.json();
    const playlists = (plData.items || []).map(p => ({
      id:    p.id,
      title: p.snippet.title,
      description: p.snippet.description || '',
      thumbnail: p.snippet.thumbnails?.medium?.url || p.snippet.thumbnails?.default?.url || '',
      itemCount: p.contentDetails.itemCount,
      synced: MPLAYLISTS.find(x => x.id === p.id)?.synced || false,
    }));

    // Merge with existing (keep synced flag)
    MPLAYLISTS = playlists.map(p => {
      const existing = MPLAYLISTS.find(x => x.id === p.id);
      return { ...p, synced: existing?.synced || false };
    });
    savePlaylists(MPLAYLISTS);

    // Auto-sync playlists that were previously synced
    const toSync = MPLAYLISTS.filter(p => p.synced);
    for (const pl of toSync) {
      await syncPlaylistSongs(pl.id, token);
    }

    updateMusicSyncBtn('synced');
    if (CURRENT === 'music') renderMusicBody();
  } catch(e) {
    updateMusicSyncBtn('error');
    if (e.message !== 'Not connected') toast('YouTube sync failed: ' + e.message, 'var(--cr)');
  } finally {
    YT_SYNCING = false;
  }
}

async function syncPlaylistSongs(playlistId, token) {
  const allItems = [];
  let pageToken = '';
  do {
    const url = `https://www.googleapis.com/youtube/v3/playlistItems?part=snippet,contentDetails&playlistId=${playlistId}&maxResults=50${pageToken ? '&pageToken=' + pageToken : ''}`;
    const res = await fetch(url, { headers: { Authorization: `Bearer ${token}` } });
    if (!res.ok) break;
    const data = await res.json();
    allItems.push(...(data.items || []));
    pageToken = data.nextPageToken || '';
  } while (pageToken);

  // Get video details for duration
  const videoIds = allItems.map(i => i.contentDetails?.videoId).filter(Boolean);
  const durations = {};
  for (let i = 0; i < videoIds.length; i += 50) {
    const chunk = videoIds.slice(i, i + 50).join(',');
    const vRes = await fetch(
      `https://www.googleapis.com/youtube/v3/videos?part=contentDetails,snippet&id=${chunk}`,
      { headers: { Authorization: `Bearer ${token}` } }
    );
    if (vRes.ok) {
      const vData = await vRes.json();
      (vData.items || []).forEach(v => {
        durations[v.id] = {
          duration: parseISO8601Duration(v.contentDetails?.duration || ''),
          artist: extractArtist(v.snippet?.title || '', v.snippet?.channelTitle || ''),
          thumbnail: v.snippet?.thumbnails?.medium?.url || v.snippet?.thumbnails?.default?.url || '',
        };
      });
    }
  }

  // Build song list from playlist
  const ytSongIds = new Set();
  const newSongs = allItems.map(item => {
    const vid = item.contentDetails?.videoId;
    if (!vid) return null;
    ytSongIds.add('yt_' + vid);
    const existing = MDATA.find(s => s.id === 'yt_' + vid);
    if (existing) return existing; // Keep existing entry

    const title = item.snippet?.title || 'Unknown';
    const det = durations[vid] || {};
    return {
      id:          'yt_' + vid,
      title:       title,
      artist:      det.artist || item.snippet?.videoOwnerChannelTitle || 'Unknown Artist',
      album:       null,
      duration:    det.duration || null,
      thumbnail:   det.thumbnail || item.snippet?.thumbnails?.medium?.url || '',
      playlistId:  playlistId,
      videoId:     vid,
      addedAt:     new Date(item.snippet?.publishedAt || Date.now()).getTime(),
      updatedAt:   Date.now(),
      manual:      false,
    };
  }).filter(Boolean);

  // Detect removed songs → move to trash concept (mark as removed)
  const existingInPlaylist = MDATA.filter(s => s.playlistId === playlistId);
  existingInPlaylist.forEach(s => {
    if (!ytSongIds.has(s.id)) {
      s.removedFromPlaylist = true;
      s.updatedAt = Date.now();
    }
  });

  // Merge
  const otherSongs = MDATA.filter(s => s.playlistId !== playlistId);
  MDATA = [...otherSongs, ...newSongs];
  saveMusic(MDATA);

  // Update playlist synced status
  const pl = MPLAYLISTS.find(p => p.id === playlistId);
  if (pl) { pl.synced = true; pl.lastSync = Date.now(); savePlaylists(MPLAYLISTS); }
}

function parseISO8601Duration(dur) {
  if (!dur) return null;
  const m = dur.match(/PT(?:(\d+)H)?(?:(\d+)M)?(?:(\d+)S)?/);
  if (!m) return null;
  const h = parseInt(m[1]||0), min = parseInt(m[2]||0), s = parseInt(m[3]||0);
  return h*3600 + min*60 + s;
}

function fmtDuration(secs) {
  if (!secs) return '—';
  const h = Math.floor(secs/3600), m = Math.floor((secs%3600)/60), s = secs%60;
  if (h > 0) return `${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  return `${m}:${String(s).padStart(2,'0')}`;
}

function extractArtist(title, channelTitle) {
  // Try "Artist - Title" pattern
  const dash = title.match(/^(.+?)\s*[-–]\s*/);
  if (dash) return dash[1].trim();
  return channelTitle.replace(/ - Topic$/, '').trim();
}

function updateMusicSyncBtn(state) {
  const btn = document.getElementById('music-sync-btn'); if (!btn) return;
  const map = {
    syncing: ['↻ Syncing', '#fb923c'],
    synced:  ['✓ Synced',  '#4ade80'],
    error:   ['✗ Sync',    '#fb7185'],
    idle:    ['⟳ Sync YT', '#fb923c'],
  };
  const [label, color] = map[state] || map.idle;
  btn.textContent = label; btn.style.color = color;
}

function renderMusicLibrary(c) {

    : MDATA.filter(s => !s.removedFromPlaylist);

  if (!songs.length) {
    c.innerHTML = `<div class="empty"><div class="empty-ico">♪</div><p>No songs yet — sync a YouTube playlist to get started</p></div>`;
    return;
  }

  // Group by album/artist
  const byArtist = {};
  songs.forEach(s => {
    const key = s.artist || 'Unknown Artist';
    if (!byArtist[key]) byArtist[key] = [];
    byArtist[key].push(s);
  });

  const totalSecs = songs.reduce((a, s) => a + (s.duration || 0), 0);
  c.innerHTML = `
    <div style="font-size:12px;color:var(--mu);margin-bottom:12px">${songs.length} song${songs.length!==1?'s':''} · ${fmtTotalDuration(totalSecs)}</div>

function songRowHtml(s) {
  return `<div class="row" style="min-height:52px" onclick="openSongDetail('${s.id}')">

      <div class="row-title">${esc(s.title)}</div>
      <div class="row-meta">
        <span style="font-size:11px;color:var(--tx2)">${esc(s.artist||'Unknown')}</span>

      </div>

      <span style="font-size:11px;color:var(--mu);white-space:nowrap">${fmtDuration(s.duration)}</span>
      <div class="row-btns" onclick="event.stopPropagation()">
        ${s.videoId?`<button class="rbt" onclick="window.open('https://youtu.be/${s.videoId}','_blank')" title="Open on YouTube" style="color:var(--ac)">▶</button>`:''}

function fmtTotalDuration(secs) {

    ${cards}`;
}

async function togglePlaylistSync(id) {
  const pl = MPLAYLISTS.find(p => p.id === id); if (!pl) return;
  if (pl.synced) {
    showConfirm(`Stop syncing "${pl.title}"? Songs already added will remain.`, async () => {
      pl.synced = false; savePlaylists(MPLAYLISTS);
      renderMusicBody();
    }, { title: 'Unsync Playlist?', okLabel: 'Unsync', danger: false });
  } else {
    pl.synced = true; savePlaylists(MPLAYLISTS);
    toast('Syncing playlist...', 'var(--ac)');
    const token = _getToken();
    if (token) {
      await syncPlaylistSongs(id, token);
      renderMusicBody();
      toast(`✓ Playlist synced`, 'var(--cd)');
    } else {
      toast('Connect YouTube first', 'var(--cr)');
      pl.synced = false; savePlaylists(MPLAYLISTS);
    }
  }
}

  const vid = document.getElementById('ms-vid')?.value?.trim().replace(/.*v=|.*youtu\.be\//,'').split('&')[0] || null;
  const song = {
    id: uid(), title,
    artist:  document.getElementById('ms-artist')?.value?.trim() || null,
    album:   document.getElementById('ms-album')?.value?.trim() || null,
    videoId: vid, thumbnail: vid ? `https://img.youtube.com/vi/${vid}/mqdefault.jpg` : '',
    duration: null, playlistId: null, manual: true,
    addedAt: Date.now(), updatedAt: Date.now(),
  };
  MDATA.unshift(song); saveMusic(MDATA);
  closePanel(); renderMusicBody(); toast('✓ Song added');
}

  c.innerHTML = `

      <div style="font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:var(--mu);margin-bottom:12px">Top Artists</div>

  const el = document.getElementById('books-body'); if (!el) return;
  if (BOOKS_PAGE==='list')       renderBooksList(el);
  else if (BOOKS_PAGE==='dashboard') renderBooksDash(el);
  else if (BOOKS_PAGE==='upcoming')  renderBooksUpcoming(el);
  document.querySelectorAll('.stab').forEach((t,i) => {
    if (['list','dashboard','upcoming'].includes(['list','dashboard','upcoming'][i]))
      t.classList.toggle('active', ['list','dashboard','upcoming'][i] === BOOKS_PAGE);
  });
}

// ── LIST ──
function filteredBooks() {
  let d = BDATA.filter(b => b.genreId === BGENRE);
  if (BSEARCH) d = d.filter(b => b.title.toLowerCase().includes(BSEARCH) || (b.author||'').toLowerCase().includes(BSEARCH));
  const fst = document.getElementById('fstatus')?.value || '';
  if (fst) d = d.filter(b => b.status === fst);
  return d.sort((a,b) => a.title.localeCompare(b.title));
}

function bookEntryStats(b) {
  const vols = b.volumes || [];
  if (!vols.length) {
    const cur = parseInt(b.currentPage||0), tot = parseInt(b.totalPages||0);
    const pct = tot ? Math.round(cur/tot*100) : 0;
    return { cur, tot, pct };
  }
  let cur=0, tot=0;
  vols.forEach(v => { cur += parseInt(v.pagesRead||0); tot += parseInt(v.totalPages||0); });
  return { cur, tot, pct: tot ? Math.round(cur/tot*100) : 0 };
}

function renderBooksList(c) {
  const data = filteredBooks();
  if (!data.length) {
    c.innerHTML = `<div class="empty" style="font-family:'Comic Neue',cursive"><div class="empty-ico">📚</div><p>No books yet — add your first one!</p></div>`;
    return;
  }
  const byS = {};
  BS_ORDER.forEach(s => { byS[s] = data.filter(b => b.status === s); });
  let html = '';
  BS_ORDER.forEach(s => {
    const rows = byS[s]; if (!rows?.length) return;
    const [col,lbl] = BS_SECTION[s];
    const coll = BCOLLAPSED['b_'+s];
    html += `<div class="ss-section">
      <div class="ss-head" onclick="toggleBColl('${s}')">
        <span class="ss-lbl" style="color:${col};font-family:'Bangers',cursive;letter-spacing:1px">${lbl}</span>
        <span class="ss-cnt">${rows.length}</span>
        <span class="ss-line" style="background:${col}33"></span>
        <span class="ss-arr${coll?' coll':''}">▾</span>
      </div>
      <div class="ss-rows${coll?' coll':''}">
        ${rows.map(b => bookRowHtml(b)).join('')}
      </div>
    </div>`;
  });
  c.innerHTML = html;
}

function bookRowHtml(b) {
  const isA = BPANEL && BPEDIT === b.id;
  const st = bookEntryStats(b);
  const col = BS_COLOR[b.status] || 'var(--ac)';
  const vols = b.volumes || [];
  const activeVol = vols.find(v => v.status === 'reading') || vols[vols.length-1];
  const hasBar = st.tot > 0 || st.cur > 0;

  return `<div class="row${isA?' active-row':''}" id="brow-${b.id}"
    style="border:2px solid var(--brd);border-radius:8px;box-shadow:2px 2px 0 var(--brd);margin-bottom:3px"
    onclick="openBookDetail('${b.id}')">
    <div class="row-bar" style="background:${col}"></div>
    <div class="row-info">
      <div class="row-title" style="font-family:'Comic Neue',cursive;font-weight:700">${esc(b.title)}</div>
      <div class="row-meta">
        ${bstag(b.status)}
        ${b.author?`<span style="font-size:11px;color:var(--tx2);font-family:'Comic Neue',cursive">${esc(b.author)}</span>`:''}
        ${vols.length?`<span style="font-size:10px;color:var(--mu)">${vols.length} vol${vols.length!==1?'s':''}</span>`:''}
      </div>
    </div>
    <div class="row-r">
      ${hasBar?`<div class="row-prog">
        <div class="prog-bar"><div class="prog-fill" style="width:${st.pct}%;background:${col}"></div></div>
        <span class="prog-txt" style="font-family:'Comic Neue',cursive">${st.cur}${st.tot?'/'+st.tot:''}p</span>
      </div>`:''}
      <div class="row-btns" onclick="event.stopPropagation()">
        ${b.status==='reading'&&hasBar?`<div class="ep-inline">
          <button class="ep-pm" onclick="quickBookPage('${b.id}',-10)">−</button>
          <span class="ep-val" style="font-family:'Comic Neue',cursive">${st.cur}</span>
          <button class="ep-pm" onclick="quickBookPage('${b.id}',10)">+</button>
        </div>`:''}
        <button class="rbt" onclick="openEditBook('${b.id}')">✏</button>
        <button class="rbt del" onclick="askDelBook('${b.id}')">✕</button>
      </div>
    </div>
  </div>`;
}

function toggleBColl(s) { BCOLLAPSED['b_'+s] = !BCOLLAPSED['b_'+s]; renderBooksBody(); }

function quickBookPage(id, delta) {
  const b = BDATA.find(x=>x.id===id); if(!b) return;
  const vols = b.volumes||[];
  if (vols.length) {
    const av = vols.find(v=>v.status==='reading') || vols[vols.length-1];
    if (av) {
      const cur = Math.max(0, parseInt(av.pagesRead||0)+delta);
      av.pagesRead = av.totalPages ? Math.min(cur, parseInt(av.totalPages)) : cur;
      if (av.totalPages && av.pagesRead >= parseInt(av.totalPages) && av.status==='reading') av.status='completed';
    }
  } else {
    b.currentPage = Math.max(0, parseInt(b.currentPage||0)+delta);
    if (b.totalPages && b.currentPage >= parseInt(b.totalPages) && b.status==='reading') { b.status='completed'; b.endDate=today(); }
  }
  b.updatedAt = Date.now(); saveBooks(BDATA); renderBooksBody();
  if (BPANEL==='detail' && BPEDIT===id) renderBookDetailPanel(BDATA.find(x=>x.id===id));
}

function addBookVol() {
  const cur = collectBookVols();
  cur.push({ id:uid(), name:`Volume ${cur.length+1}`, status:'want', pagesRead:'', totalPages:'', startDate:'', endDate:'' });
  BFORM_TL=cur; refreshBFtl();
}
function removeBookVol(i) { const c=collectBookVols(); c.splice(i,1); BFORM_TL=c; refreshBFtl(); }
function refreshBFtl()    { document.getElementById('bftl-list').innerHTML = BFORM_TL.map((v,i)=>bookVolHtml(v,i)).join(''); }

function collectBookVols() {
  const items = [];
  document.querySelectorAll('#bftl-list .ftl-item').forEach((el,i) => {
    const get = fi => { const x=el.querySelector(`[data-fi="${fi}"]`); return x?x.value:''; };
    items.push({ id:el.dataset.vid||uid(), name:get('name'), status:get('status')||'want',
      pagesRead:get('pagesRead')||null, totalPages:get('totalPages')||null,
      startDate:get('startDate')||null, endDate:get('endDate')||null });
  });
  return items;
}

function saveBook(eid) {
  const title = document.getElementById('bf-title')?.value?.trim();
  if (!title) { showAlert('Please enter a book title', {title:'Missing Title'}); return; }
  const existing = eid ? BDATA.find(x=>x.id===eid) : null;
  const vols = collectBookVols();
  const entry = {
    id: eid||uid(), title,
    author:      document.getElementById('bf-author')?.value?.trim()||null,
    genreId:     document.getElementById('bf-genre')?.value||BGENRE,
    status:      document.getElementById('bf-status')?.value||'want',
    rating:      document.getElementById('bf-rating')?.value||null,
    currentPage: document.getElementById('bf-cur')?.value||null,
    totalPages:  document.getElementById('bf-tot')?.value||null,
    startDate:   document.getElementById('bf-start')?.value||null,
    endDate:     document.getElementById('bf-end')?.value||null,
    favorite:    document.getElementById('bf-fav')?.checked||false,
    notes:       document.getElementById('bf-notes')?.value?.trim()||null,
    volumes:     vols,
    addedAt:     existing?existing.addedAt:Date.now(),
    updatedAt:   Date.now(),
  };
  if (entry.status==='completed'&&!entry.endDate&&!vols.length) entry.endDate=today();
  if (eid) { const i=BDATA.findIndex(x=>x.id===eid); BDATA[i]=entry; } else BDATA.unshift(entry);
  saveBooks(BDATA);
  BPANEL=null; BPEDIT=null;
  document.getElementById('rpanel').classList.remove('open');
  document.getElementById('poverlay').classList.remove('show');
  document.getElementById('content').classList.remove('pushed');
  renderBooksBody(); toast('✓ Book saved');
}

function askDelBook(id) {
  showConfirm('This book will be permanently deleted.', () => {
    BDATA = BDATA.filter(x=>x.id!==id);
    saveBooks(BDATA);
    BPANEL=null; BPEDIT=null;
    document.getElementById('rpanel').classList.remove('open');
    document.getElementById('poverlay').classList.remove('show');
    document.getElementById('content').classList.remove('pushed');
    renderBooksBody(); toast('Deleted');
  }, {title:'Delete Book?',okLabel:'Delete'});
}

// ── UPCOMING ──
function renderBooksUpcoming(c) {
  const now = new Date(); now.setHours(0,0,0,0);
  const items = BDATA.filter(b=>b.upcomingDate).map(b=>({...b,date:b.upcomingDate}));
  items.sort((a,b)=>new Date(a.date)-new Date(b.date));
  const rows = items.map(b=>{
    const d=new Date(b.date+'T00:00:00');
    const diff=Math.ceil((d-now)/86400000);
    const mon=d.toLocaleString('default',{month:'short'}).toUpperCase();
    let cls='up-far',lbl=`${diff}d`;
    if(diff<=0){cls='up-past';lbl='Released';}
    else if(diff<=3){cls='up-soon';lbl=`${diff}d left`;}
    else if(diff<=14){cls='up-near';lbl=`${diff}d`;}
    return`<div class="up-card" style="border:2px solid var(--brd);box-shadow:2px 2px 0 var(--brd)" onclick="openBookDetail('${b.id}')">
      <div class="up-date-box"><div class="up-mon">${mon}</div><div class="up-day">${d.getDate()}</div></div>
      <div class="up-info"><div class="up-title" style="font-family:'Comic Neue',cursive;font-weight:700">${esc(b.title)}</div>
        <div class="up-sub" style="font-family:'Comic Neue',cursive">${b.author?esc(b.author):''}</div></div>
      <div class="up-pill ${cls}">${lbl}</div>
    </div>`;
  }).join('');
  c.innerHTML=`<div style="font-family:'Bangers',cursive;font-size:22px;font-weight:700;margin-bottom:16px;letter-spacing:2px;color:var(--ac)">🗓 Upcoming Books</div>
    ${rows||`<div class="empty"><div class="empty-ico">📅</div><p style="font-family:'Comic Neue',cursive">No upcoming books</p></div>`}`;
}

const AI_KEY_STORAGE = 'ac_claude_key';
let AI_OPEN = false;
let AI_HISTORY = []; // {role, content}
let AI_TYPING = false;

function getAIKey() { return ls.str(AI_KEY_STORAGE) || null; }
function setAIKey(k) { ls.setStr(AI_KEY_STORAGE, k); }

// ── Build context for Claude ──
function buildAIContext() {
  const now = new Date();
  const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const today = days[now.getDay()];
  const dateStr = now.toLocaleDateString('en-GB', { weekday:'long', day:'numeric', month:'long', year:'numeric' });

  // Compact media summary
  const watching = DATA.filter(e => e.status === 'watching').map(e => {
    const as = activeSeason(e);
    const st = entryStats(e);
    return `${e.title} (${gbyid(e.genreId).name}, ${st.cur}/${st.tot||'?'} ep${e.airingDay!=null?`, airs ${days[e.airingDay]}`:''}${e.rating?`, rated ${e.rating}`:''})`; 
  });

  const allMedia = DATA.map(e => {
    const st = entryStats(e);
    const tl = (e.timeline||[]).map(t => `${t.name||t.movieTitle||''}:${t.status||''}${t.type==='season'?`(${t.epWatched||0}/${t.eps||'?'}ep)`:'(movie)'}`).join('; ');
    return {
      id: e.id, title: e.title, genre: gbyid(e.genreId).name,
      status: e.status, watched: st.cur, total: st.tot||null,
      rating: e.rating||null, notes: e.notes||null,
      airingDay: e.airingDay!=null ? days[e.airingDay] : null,
      airingTime: e.airingTime||null,
      rewatchCount: e.rewatchCount||null,
      favorite: e.favorite||false,
      timeline: tl || null,
    };
  });

  const stats = {
    total: DATA.length,
    watching: DATA.filter(e=>e.status==='watching').length,
    completed: DATA.filter(e=>e.status==='completed').length,
    dropped: DATA.filter(e=>e.status==='dropped').length,
    planToWatch: DATA.filter(e=>e.status==='plan').length,
    avgRating: (() => { const r=DATA.filter(e=>e.rating); return r.length?(r.reduce((a,e)=>a+parseFloat(e.rating),0)/r.length).toFixed(1):'N/A'; })(),
    totalEpsWatched: DATA.reduce((a,e)=>a+entryStats(e).cur, 0),
  };

  return `You are an AI assistant for "The Aether Codex" — a personal media tracker. You are helping the user manage and explore their media data.

TODAY: ${dateStr}

USER STATS:
${JSON.stringify(stats, null, 2)}

ALL MEDIA ENTRIES (${allMedia.length} total):
${JSON.stringify(allMedia, null, 2)}

GAMES (${GDATA.length}):
${JSON.stringify(GDATA.map(g=>({id:g.id,title:g.title,platform:g.platform,status:g.status,hours:g.totalHours,rating:g.rating})), null, 2)}

BOOKS (${BDATA.length}):
${JSON.stringify(BDATA.map(b=>({id:b.id,title:b.title,author:b.author,status:b.status,rating:b.rating})), null, 2)}

MUSIC (${MDATA.filter(s=>!s.removedFromPlaylist).length} songs):
${JSON.stringify(MDATA.filter(s=>!s.removedFromPlaylist).slice(0,50).map(s=>({title:s.title,artist:s.artist,album:s.album})), null, 2)}${MDATA.length>50?`\n... and ${MDATA.length-50} more songs`:''}

INSTRUCTIONS:
- Be conversational, friendly and concise. Use short responses.
- For READ queries: answer directly from the data above.
- For ACTION requests (add/edit/delete/update): respond with a friendly confirmation message AND include a JSON block at the end of your response like this:
  <ACTION>{"type":"update_status","id":"entry_id","field":"status","value":"completed"}</ACTION>
  Valid action types: update_status, update_rating, update_episodes, update_hours, add_entry, delete_entry, update_notes
  For update_hours: {type:"update_hours", title, value} — updates totalHours for a game entry
  For add_entry include: {type:"add_entry", title, genreId, status, epTot(optional)}
  For update_episodes: {type:"update_episodes", id, epCur}
- Always confirm before destructive actions (delete).
- If data is not found, say so clearly.
- Keep responses under 150 words unless showing a list.
- Never make up data that isn't in the user's list.`;
}

// ── Send message to Claude API ──
async function sendAIMessage(userMsg) {
  const key = 'proxy'; // Key handled by Cloudflare Worker

  AI_HISTORY.push({ role: 'user', parts: [{ text: userMsg }] });
  renderAIMessages();
  setAITyping(true);

  try {
    // Inject system context as first user/model exchange (same pattern as test file)
    const withContext = [
      { role: 'user',  parts: [{ text: buildAIContext() }] },
      { role: 'model', parts: [{ text: 'Understood. I have full access to your media data and am ready to help!' }] },
      ...AI_HISTORY
    ];

    const res = await fetch(
      'https://aether-codex-ai.nadeempubgmobile2-0.workers.dev',
      {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ contents: withContext })
      }
    );

    const data = await res.json();

    if (!res.ok) {
      throw new Error(data.error?.message || `API error ${res.status}`);
    }

    const reply = data.candidates?.[0]?.content?.parts?.[0]?.text || 'Sorry, I could not generate a response.';
    const actionMatch = reply.match(/<ACTION>([\s\S]*?)<\/ACTION>/);

    AI_HISTORY.push({ role: 'model', parts: [{ text: reply }] });
    setAITyping(false);
    renderAIMessages();

    if (actionMatch) {
      try { const action = JSON.parse(actionMatch[1]); setTimeout(() => handleAIAction(action), 300); }
      catch(e) { console.warn('AI action parse failed:', e); }
    }
  } catch(e) {
    setAITyping(false);
    AI_HISTORY.push({ role: 'model', parts: [{ text: `Sorry, something went wrong: ${e.message}` }] });
    renderAIMessages();
  }
}

// ── Handle AI actions ──
function handleAIAction(action) {
  switch(action.type) {
    case 'update_status': {
      const e = DATA.find(x => x.id === action.id || x.title.toLowerCase() === (action.title||'').toLowerCase()) ||
                DATA.find(x => x.title.toLowerCase().includes((action.title||'').toLowerCase())) ||
                DATA.find(x => (action.title||'').toLowerCase().includes(x.title.toLowerCase().split(' ').slice(0,3).join(' ')));
      if (!e) { appendAIMessage('assistant', "I couldn't find that entry in your list."); return; }
      showConfirm(`Change "${e.title}" status to "${action.value}"?`, () => {
        e.status = action.value;
        if (action.value === 'completed' && !e.endDate) e.endDate = today();
        e.updatedAt = Date.now();
        saveData(DATA);
        if (CURRENT === 'media') render();
        appendAIMessage('assistant', `✓ Done! "${e.title}" is now ${action.value}.`);
      }, { title: 'Confirm Change', okLabel: 'Yes, update', danger: false });
      break;
    }
    case 'update_rating': {
      const e = DATA.find(x => x.id === action.id || x.title.toLowerCase() === (action.title||'').toLowerCase()) ||
                DATA.find(x => x.title.toLowerCase().includes((action.title||'').toLowerCase())) ||
                DATA.find(x => (action.title||'').toLowerCase().includes(x.title.toLowerCase().split(' ').slice(0,3).join(' ')));
      if (!e) { appendAIMessage('assistant', "I couldn't find that entry."); return; }
      showConfirm(`Set rating for "${e.title}" to ${action.value}?`, () => {
        e.rating = String(action.value);
        e.updatedAt = Date.now();
        saveData(DATA);
        if (CURRENT === 'media') render();
        appendAIMessage('assistant', `✓ Rating for "${e.title}" set to ${action.value}/10.`);
      }, { title: 'Confirm Rating', okLabel: 'Yes', danger: false });
      break;
    }
    case 'update_episodes': {
      const e = DATA.find(x => x.id === action.id || x.title.toLowerCase() === (action.title||'').toLowerCase()) ||
                DATA.find(x => x.title.toLowerCase().includes((action.title||'').toLowerCase())) ||
                DATA.find(x => (action.title||'').toLowerCase().includes(x.title.toLowerCase().split(' ').slice(0,3).join(' ')));
      if (!e) { appendAIMessage('assistant', "I couldn't find that entry."); return; }
      showConfirm(`Update "${e.title}" to episode ${action.epCur}?`, () => {
        if (e.timeline?.length) {
          const as = activeSeason(e);
          if (as) { as.epWatched = String(action.epCur); }
        } else {
          e.epCur = String(action.epCur);
        }
        e.updatedAt = Date.now();
        saveData(DATA);
        if (CURRENT === 'media') render();
        appendAIMessage('assistant', `✓ "${e.title}" updated to episode ${action.epCur}.`);
      }, { title: 'Confirm Update', okLabel: 'Yes', danger: false });
      break;
    }
    case 'add_entry': {
      showConfirm(`Add "${action.title}" to your ${action.genreId||'Anime'} list as ${action.status||'Plan to Watch'}?`, () => {
        const g = GENRES.find(g => g.name.toLowerCase() === (action.genreId||'anime').toLowerCase()) || GENRES[0];
        const entry = {
          id: uid(), title: action.title, genreId: g.id,
          status: action.status || 'plan',
          epTot: action.epTot||null, epCur: null,
          rating: null, notes: null, timeline: [],
          addedAt: Date.now(), updatedAt: Date.now(),
        };
        DATA.unshift(entry);
        saveData(DATA);
        if (CURRENT === 'media') render();
        appendAIMessage('assistant', `✓ Added "${action.title}" to your list!`);
      }, { title: 'Confirm Add', okLabel: 'Add', danger: false });
      break;
    }
    case 'update_hours': {
      const g = GDATA.find(x => x.id === action.id || x.title.toLowerCase() === (action.title||'').toLowerCase()) ||
                GDATA.find(x => x.title.toLowerCase().includes((action.title||'').toLowerCase())) ||
                GDATA.find(x => (action.title||'').toLowerCase().includes(x.title.toLowerCase().split(' ').slice(0,3).join(' ')));
      if (!g) { appendAIMessage('assistant', "I couldn't find that game."); return; }
      showConfirm(`Update hours for "${g.title}" to ${action.value}h?`, () => {
        g.totalHours = parseFloat(action.value);
        g.updatedAt = Date.now();
        saveGames(GDATA);
        if (CURRENT === 'games') renderGamesBody();
        appendAIMessage('assistant', `✓ Hours for "${g.title}" updated to ${action.value}h.`);
      }, { title: 'Confirm Update', okLabel: 'Yes', danger: false });
      break;
    }
    case 'delete_entry': {
      const e = DATA.find(x => x.id === action.id || x.title.toLowerCase() === (action.title||'').toLowerCase());
      if (!e) { appendAIMessage('assistant', "I couldn't find that entry."); return; }
      showConfirm(`Delete "${e.title}" permanently?`, () => {
        DATA = DATA.filter(x => x.id !== e.id);
        saveData(DATA);
        if (CURRENT === 'media') render();
        appendAIMessage('assistant', `✓ "${e.title}" has been deleted.`);
      }, { title: 'Delete Entry?', okLabel: 'Delete' });
      break;
    }
    case 'update_notes': {
      const e = DATA.find(x => x.id === action.id || x.title.toLowerCase() === (action.title||'').toLowerCase());
      if (!e) { appendAIMessage('assistant', "I couldn't find that entry."); return; }
      e.notes = action.value; e.updatedAt = Date.now();
      saveData(DATA);
      if (CURRENT === 'media') render();
      appendAIMessage('assistant', `✓ Notes updated for "${e.title}".`);
      break;
    }
  }
}

function toggleAI() {
  AI_OPEN = !AI_OPEN;
  const panel = document.getElementById('ai-panel');
  if (!panel) return;
  panel.style.transform = AI_OPEN ? 'translateY(0)' : 'translateY(100%)';
  panel.style.opacity = AI_OPEN ? '1' : '0';
  if (AI_OPEN && !getAIKey()) showAIKeyPrompt();
  else if (AI_OPEN) document.getElementById('ai-input')?.focus();
}

function showAIKeyPrompt() {
  appendAIMessage('assistant', `👋 Hi! To use me, paste your **Gemini API key**.

Get one free at [aistudio.google.com](https://aistudio.google.com) → Get API Key → Create API key in new project.

Go to **Settings → AI Assistant** to paste it, or type it below:`);
  // Show key input inline
  const msgs = document.getElementById('ai-messages');
  if (!msgs) return;
  const inp = document.createElement('div');
  inp.style.cssText = 'padding:8px 12px';
  inp.innerHTML = `<div style="display:flex;gap:6px">
    <input id="ai-key-inp" type="password" placeholder="AIzaSy..." style="flex:1;background:var(--surf2);border:1px solid var(--brd);border-radius:5px;padding:8px 10px;font-size:12px;color:var(--tx);outline:none">
    <button onclick="saveAIKeyFromInput()" style="background:var(--ac);color:#000;border:none;border-radius:5px;padding:8px 14px;font-size:12px;font-weight:700;cursor:pointer">Save</button>
  </div>`;
  msgs.appendChild(inp);
  msgs.scrollTop = msgs.scrollHeight;
}

function saveAIKeyFromInput() {
  const val = document.getElementById('ai-key-inp')?.value?.trim();
  if (!val) { toast('Please enter an API key', 'var(--cr)'); return; }
  setAIKey(val);
  AI_HISTORY = [];
  renderAIMessages();
  toast('✓ API key saved', 'var(--cd)');
  appendAIMessage('assistant', "✓ Key saved! I'm ready. Ask me anything about your media collection — or tell me to make changes!");
}

function renderAIMessages() {
  const msgs = document.getElementById('ai-messages'); if (!msgs) return;
  if (!AI_HISTORY.length) {
    msgs.innerHTML = `<div style="padding:20px;text-align:center;color:var(--mu);font-size:13px">
      <div style="font-size:28px;margin-bottom:8px">✦</div>
      <div style="font-weight:600;color:var(--tx2);margin-bottom:4px">AI Assistant</div>
      <div>Ask me about your media, or tell me to make changes.</div>
    </div>`;
    return;
  }
  msgs.innerHTML = AI_HISTORY
    .map(m => {
      const isUser = m.role === 'user';
      const rawText = m.parts?.[0]?.text || '';
      const clean = rawText.replace(/<ACTION>[\s\S]*?<\/ACTION>/g, '').trim();
      return `<div style="display:flex;justify-content:${isUser?'flex-end':'flex-start'};padding:4px 12px">
        <div style="max-width:85%;padding:9px 13px;border-radius:${isUser?'12px 12px 3px 12px':'12px 12px 12px 3px'};background:${isUser?'var(--ac)':'var(--surf2)'};color:${isUser?'#000':'var(--tx)'};font-size:13px;line-height:1.5;border:${isUser?'none':'1px solid var(--brd)'}">
          ${clean.replace(/\n/g,'<br>').replace(/\*\*(.+?)\*\*/g,'<b>$1</b>')}
        </div>
      </div>`;
    }).join('');
  msgs.scrollTop = msgs.scrollHeight;
}

function appendAIMessage(role, content) {
  AI_HISTORY.push({ role: role === 'assistant' ? 'model' : role, parts: [{ text: content }] });
  renderAIMessages();
}

function setAITyping(v) {
  AI_TYPING = v;
  const ind = document.getElementById('ai-typing');
  if (ind) ind.style.display = v ? 'flex' : 'none';
}

function aiSend() {
  const inp = document.getElementById('ai-input');
  const msg = inp?.value?.trim(); if (!msg || AI_TYPING) return;
  inp.value = '';
  sendAIMessage(msg);
}

function aiKeydown(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); aiSend(); } }
