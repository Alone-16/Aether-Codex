<script>
(function(){
  var VALID = ['home','media','games','books','music','notes','vault','tools','log','settings'];
  var bg = {
    home:'#000000', media:'#000000', games:'#000000',
    books:'#000000', music:'#000000', vault:'#000000',
    log:'#000000', tools:'#000000', settings:'#000000', notes:'#000000'
  };

  // Read hash and validate it — ignore anything that isn't a real section
  var rawHash = location.hash.replace('#/','').replace('#','').trim();
  var hash    = VALID.indexOf(rawHash) !== -1 ? rawHash : '';

  // Clear bad hash from URL immediately so it doesn't confuse the JS boot
  if (rawHash && !hash) {
    history.replaceState({}, '', location.pathname);
  }

  // Saved section — only trust it if it's a known section
  var saved = localStorage.getItem('ac_last_section');
  if (VALID.indexOf(saved) === -1) saved = null;

  // First visit: no hash, nothing saved → default to home and remember it
  if (!hash && !saved) {
    localStorage.setItem('ac_last_section', 'home');
  }

  var section = hash || saved || 'home';
  var col     = bg[section] || bg.home;

  document.documentElement.setAttribute('data-section', section);
  document.documentElement.style.background      = col;
  document.documentElement.style.backgroundColor = col;
})();
</script>
<style>html,body{visibility:hidden}</style>

      </div>

    <select class="fsel" id="fstatus" onchange="render()" style="display:none">

      <option value="plan">Plan to Watch</option>

      <option value="on_hold">On Hold</option>

      <option value="upcoming">Upcoming</option>
    </select>

      <option value="added">Recently Added</option>

<!-- AI ASSISTANT PANEL -->
<div id="ai-panel" style="position:fixed;bottom:0;right:0;width:100%;max-width:480px;height:75vh;background:var(--surf);border:1px solid var(--brd);border-radius:12px 12px 0 0;z-index:9500;display:flex;flex-direction:column;transform:translateY(100%);opacity:0;transition:transform .3s cubic-bezier(.4,0,.2,1),opacity .3s;box-shadow:0 -8px 32px rgba(0,0,0,.5)">
  <div style="padding:12px 16px;border-bottom:1px solid var(--brd);display:flex;align-items:center;justify-content:space-between;flex-shrink:0">
    <div style="display:flex;align-items:center;gap:8px">
      <span style="font-size:16px;color:var(--ac)">✦</span>
      <span style="font-size:14px;font-weight:700;color:var(--tx);font-family:var(--fd)">AI Assistant</span>
    </div>
    <div style="display:flex;gap:6px;align-items:center">
      <button onclick="clearAIHistory()" title="Clear AI history" style="padding:0 8px;height:26px;border-radius:5px;background:var(--surf2);border:1px solid var(--brd);color:var(--tx2);font-size:11px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-family:var(--fd)">Clear AI history</button>
      <button onclick="toggleAI()" style="width:26px;height:26px;border-radius:50%;background:var(--surf2);border:1px solid var(--brd);color:var(--tx2);font-size:14px;display:flex;align-items:center;justify-content:center;cursor:pointer">✕</button>
    </div>
  </div>
  <div id="ai-messages" style="flex:1;overflow-y:auto;padding:8px 0;display:flex;flex-direction:column;gap:4px"></div>
  <div id="ai-typing" style="display:none;padding:6px 16px;align-items:center;gap:6px">
    <div style="display:flex;gap:4px;align-items:center">
      <span style="width:6px;height:6px;border-radius:50%;background:var(--ac);animation:ai-bounce .8s infinite 0s"></span>
      <span style="width:6px;height:6px;border-radius:50%;background:var(--ac);animation:ai-bounce .8s infinite .15s"></span>
      <span style="width:6px;height:6px;border-radius:50%;background:var(--ac);animation:ai-bounce .8s infinite .3s"></span>
    </div>
    <span style="font-size:12px;color:var(--mu)">Thinking...</span>
  </div>

  </div>
</div>
<style>
