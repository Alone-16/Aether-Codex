<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Aether Codex</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
/* ── THEMES ── */
[data-theme="dark"]{--bg:#0b0b13;--surf:#13131f;--surf2:#1a1a28;--surf3:#222234;--brd:#2a2a3e;--brd2:#383850;--tx:#eeedf8;--tx2:#8888aa;--mu:#44445a;--sh:0 4px 24px rgba(0,0,0,.45)}
[data-theme="light"]{--bg:#edeae2;--surf:#fafaf6;--surf2:#f2efe8;--surf3:#e8e4da;--brd:#dddad0;--brd2:#ccc8bc;--tx:#1c1b18;--tx2:#5a584f;--mu:#9e9c8a;--sh:0 4px 24px rgba(0,0,0,.09)}
:root{
  --g:#e879a0;--gs:rgba(232,121,160,.1);--gm:rgba(232,121,160,.18);--gb:#1e0e18;
  --cw:#38bdf8;--cd:#4ade80;--ch:#fbbf24;--cr:#fb7185;--cp:#a78bfa;--cu:#fb923c;--cm:#f472b6;
  --r:8px;--rs:5px;
}

/* ── RESET ── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--tx);font-size:14px;-webkit-font-smoothing:antialiased;transition:background .2s,color .2s}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--brd);border-radius:3px}
button{cursor:pointer;font-family:inherit;border:none;background:none}
input,select,textarea{font-family:inherit;color:var(--tx)}

/* ── NAVBAR ── */
#navbar{height:50px;background:var(--surf);border-bottom:1px solid var(--brd);display:flex;align-items:center;padding:0 16px;gap:0;position:sticky;top:0;z-index:100;flex-shrink:0;overflow:visible}
.logo{font-family:'Cinzel',serif;font-size:14px;font-weight:700;white-space:nowrap;margin-right:16px;letter-spacing:.5px}
.logo em{color:var(--g);font-style:italic;transition:color .3s}
.nav-left{display:flex;align-items:center;gap:4px;flex:1;min-width:0;overflow:visible}
.nav-right{display:flex;align-items:center;gap:6px;flex-shrink:0;margin-left:12px}
.ntab{padding:6px 12px;border-radius:var(--rs);font-size:13px;font-weight:500;color:var(--tx2);transition:all .15s;white-space:nowrap}
.ntab:hover{background:var(--surf2);color:var(--tx)}
.ntab.active{background:var(--surf2);color:var(--tx);font-weight:600}

/* ── GENRE DROPDOWN ── */
.gdrop{position:relative}
.gdrop-btn{display:flex;align-items:center;gap:7px;padding:6px 12px;border-radius:var(--rs);background:var(--gs);border:1px solid var(--gm);color:var(--g);font-size:13px;font-weight:600;transition:all .15s;white-space:nowrap}
.gdrop-btn:hover{background:var(--gm)}
.gdot{width:8px;height:8px;border-radius:50%;background:var(--g);flex-shrink:0}
.gdrop-menu{position:absolute;top:calc(100% + 6px);left:0;background:var(--surf);border:1px solid var(--brd);border-radius:var(--r);min-width:190px;z-index:200;box-shadow:var(--sh);overflow:hidden;display:none}
.gdrop-menu.open{display:block}
.gm-item{display:flex;align-items:center;gap:10px;padding:9px 14px;font-size:13px;font-weight:500;color:var(--tx2);cursor:pointer;transition:background .1s}
.gm-item:hover,.gm-item.active{background:var(--surf2);color:var(--tx)}
.gm-sep{height:1px;background:var(--brd);margin:4px 0}

/* ── NAV BUTTONS ── */
.search-inp{background:var(--surf2);border:1px solid var(--brd);border-radius:var(--rs);padding:6px 12px;font-size:13px;color:var(--tx);outline:none;width:180px;transition:border-color .15s}
.search-inp:focus{border-color:var(--g)}
.search-inp::placeholder{color:var(--mu)}
.add-btn{background:var(--g);color:#fff;border-radius:var(--rs);padding:6px 16px;font-size:13px;font-weight:700;transition:opacity .15s;white-space:nowrap}
.add-btn:hover{opacity:.85}
.icon-btn{height:30px;border-radius:var(--rs);background:var(--surf2);border:1px solid var(--brd);color:var(--tx2);font-size:11px;font-weight:600;padding:0 10px;display:flex;align-items:center;gap:4px;transition:all .15s;white-space:nowrap}
.icon-btn:hover{background:var(--surf3);color:var(--tx)}
.theme-btn{width:30px;height:30px;border-radius:50%;background:var(--surf2);border:1px solid var(--brd);color:var(--tx2);font-size:14px;display:flex;align-items:center;justify-content:center;transition:all .15s}
.theme-btn:hover{background:var(--surf3)}

/* ── FILTER BAR ── */
#filterbar{background:var(--surf);border-bottom:1px solid var(--brd);padding:7px 16px;display:flex;align-items:center;gap:8px;flex-shrink:0}
.fsel{background:var(--surf2);border:1px solid var(--brd);border-radius:var(--rs);padding:5px 10px;font-size:12px;color:var(--tx2);outline:none;cursor:pointer}
.fsel:focus{border-color:var(--g)}
.count-lbl{font-size:12px;color:var(--mu);margin-left:4px}

/* ── LAYOUT ── */
#app{display:flex;flex-direction:column;height:100vh}
#main-wrap{flex:1;display:flex;overflow:hidden}
#content{flex:1;overflow-y:auto;padding:16px 20px;transition:margin-right .25s}
#content.panel-push{margin-right:430px}

/* ── RIGHT PANEL ── */
#poverlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:299;opacity:0;pointer-events:none;transition:opacity .25s}
#poverlay.show{opacity:1;pointer-events:all}
#rpanel{position:fixed;top:0;right:0;width:430px;height:100vh;background:var(--surf);border-left:1px solid var(--brd);z-index:300;transform:translateX(100%);transition:transform .25s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;overflow:hidden}
#rpanel.open{transform:translateX(0)}
#panel-inner{flex:1;overflow-y:auto;display:flex;flex-direction:column}
.ph{padding:16px 18px;border-bottom:1px solid var(--brd);background:var(--surf);position:sticky;top:0;z-index:10;display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
.ph-title{font-family:'Cinzel',serif;font-size:16px;font-weight:600;line-height:1.3;flex:1}
.ph-close{width:28px;height:28px;border-radius:50%;background:var(--surf2);border:1px solid var(--brd);color:var(--tx2);font-size:16px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}
.ph-close:hover{background:var(--surf3)}

/* ── PANEL STATS ── */
.pstats{display:grid;grid-template-columns:repeat(4,1fr);border-bottom:1px solid var(--brd)}
.pstat{padding:10px 14px;text-align:center}
.pstat-v{font-family:'Cinzel',serif;font-size:16px;font-weight:600;line-height:1}
.pstat-l{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--mu);margin-top:3px}
.pprog{height:3px;background:var(--surf3);border-radius:2px;overflow:hidden;margin:4px 0 0}
.pprog-fill{height:100%;border-radius:2px;background:var(--g);transition:width .3s}

/* ── TIMELINE PANEL ── */
.sec-div{display:flex;align-items:center;gap:10px;padding:14px 18px 8px}
.sec-div-lbl{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:1.2px;color:var(--mu)}
.sec-div-line{flex:1;height:1px;background:var(--brd)}
.sec-div-hint{font-size:10px;color:var(--mu)}
.tl-wrap{padding:0 18px 8px}
.tl-item{display:flex;align-items:center;gap:10px;background:var(--surf2);border:1px solid var(--brd);border-radius:var(--r);padding:10px 12px;margin-bottom:6px;transition:border-color .15s;cursor:grab}
.tl-item.tl-current{background:var(--gb);border-color:var(--gm)}
.tl-item.tl-movie{border-left:3px solid var(--cm)}
.tl-item.drag-over{border-color:var(--g);background:var(--gs)}
.tl-item.dragging{opacity:.4}
.tl-drag{color:var(--mu);font-size:14px;flex-shrink:0;padding:2px 4px;user-select:none}
.tl-type-pill{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;padding:2px 7px;border-radius:3px;flex-shrink:0}
.tp-season{background:var(--surf3);color:var(--tx2)}
.tp-movie{background:rgba(244,114,182,.12);color:var(--cm)}
.tl-info{flex:1;min-width:0}
.tl-name{font-size:13px;font-weight:600;color:var(--tx);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tl-sub{font-size:11px;color:var(--mu);margin-top:2px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.tl-right{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0}
.tl-ep{font-size:11px;color:var(--tx2);white-space:nowrap}
.mini-bar{width:70px;height:3px;background:var(--surf3);border-radius:2px;overflow:hidden}
.mini-fill{height:100%;border-radius:2px}
.ep-ctrl{display:flex;align-items:center;gap:5px}
.ep-pm{width:22px;height:22px;border-radius:5px;background:var(--surf3);border:1px solid var(--brd);color:var(--tx2);font-size:14px;font-weight:700;display:flex;align-items:center;justify-content:center;transition:all .12s}
.ep-pm:hover{background:var(--gs);color:var(--g);border-color:var(--gm)}
.ep-num{font-size:12px;font-weight:600;min-width:20px;text-align:center}
.pnotes{padding:0 18px 14px}
.pnotes-box{background:var(--surf2);border:1px solid var(--brd);border-radius:var(--rs);padding:10px 12px;font-size:12.5px;color:var(--tx2);line-height:1.6;font-style:italic}
.pbadges{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}

/* ── LIST ── */
.status-section{margin-bottom:20px}
.ss-head{display:flex;align-items:center;gap:10px;margin-bottom:6px;padding:0 2px;cursor:pointer;user-select:none}
.ss-label{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:1.4px}
.ss-count{font-size:10px;font-weight:700;color:var(--mu)}
.ss-line{flex:1;height:1px;background:var(--brd)}
.ss-arrow{font-size:10px;color:var(--mu);transition:transform .2s}
.ss-arrow.collapsed{transform:rotate(-90deg)}
.ss-rows{display:flex;flex-direction:column;gap:2px}
.ss-rows.collapsed{display:none}
.row{display:flex;align-items:center;background:var(--surf);border:1px solid var(--brd);padding:0 12px 0 0;transition:border-color .12s,background .12s;cursor:pointer;min-height:46px}
.row:hover{border-color:var(--brd2)}
.row.active-row{background:var(--gb);border-color:var(--gm)}
.row-bar{width:3px;min-height:46px;flex-shrink:0;align-self:stretch}
.row-info{flex:1;min-width:0;padding:10px 10px 10px 12px}
.row-title{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.3}
.row-meta{display:flex;align-items:center;gap:8px;margin-top:4px;flex-wrap:wrap}
.row-right{display:flex;align-items:center;gap:6px;flex-shrink:0;padding:0 4px}
.row-prog{display:flex;align-items:center;gap:6px}
.prog-bar{width:60px;height:3px;background:var(--surf3);border-radius:2px;overflow:hidden}
.prog-fill{height:100%;border-radius:2px;transition:width .3s}
.prog-txt{font-size:11px;color:var(--mu);white-space:nowrap}
.row-btns{display:flex;align-items:center;gap:3px}
.rbt{width:26px;height:26px;border-radius:var(--rs);background:var(--surf2);border:1px solid var(--brd);color:var(--tx2);font-size:11px;display:flex;align-items:center;justify-content:center;transition:all .12s;flex-shrink:0}
.rbt:hover{background:var(--surf3);color:var(--tx)}
.rbt.del:hover{background:rgba(251,113,133,.1);color:var(--cr);border-color:rgba(251,113,133,.3)}
.ep-inline{display:flex;align-items:center;gap:4px}
.ep-pm-sm{width:22px;height:22px;border-radius:4px;background:var(--surf2);border:1px solid var(--brd);color:var(--tx2);font-size:13px;font-weight:700;display:flex;align-items:center;justify-content:center;transition:all .12s}
.ep-pm-sm:hover{background:var(--gs);color:var(--g);border-color:var(--gm)}
.ep-val{font-size:12px;font-weight:700;min-width:18px;text-align:center}

/* ── STATUS TAGS ── */
.stag{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.3px}
.st-watching{background:rgba(56,189,248,.12);color:var(--cw)}
.st-completed{background:rgba(74,222,128,.12);color:var(--cd)}
.st-on_hold{background:rgba(251,191,36,.12);color:var(--ch)}
.st-dropped{background:rgba(251,113,133,.12);color:var(--cr)}
.st-plan{background:rgba(167,139,250,.12);color:var(--cp)}
.st-upcoming{background:rgba(251,146,60,.12);color:var(--cu)}
.st-not_started{background:var(--surf3);color:var(--mu)}

/* ── DASHBOARD ── */
.dash-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px;margin-bottom:20px}
.dash-card{background:var(--surf);border:1px solid var(--brd);border-radius:var(--r);padding:14px 16px;transition:border-color .15s}
.dash-card:hover{border-color:var(--brd2)}
.dc-val{font-family:'Cinzel',serif;font-size:26px;font-weight:700;line-height:1}
.dc-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--mu);margin-top:4px}

/* ── UPCOMING ── */
.up-card{background:var(--surf);border:1px solid var(--brd);border-radius:var(--r);padding:13px 16px;display:flex;align-items:center;gap:14px;margin-bottom:8px;transition:border-color .15s;cursor:pointer}
.up-card:hover{border-color:var(--brd2)}
.up-date-box{min-width:48px;text-align:center;background:rgba(251,146,60,.08);border:1px solid rgba(251,146,60,.2);border-radius:var(--rs);padding:8px 6px}
.up-month{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:var(--cu)}
.up-day{font-family:'Cinzel',serif;font-size:22px;font-weight:700;line-height:1}
.up-info{flex:1;min-width:0}
.up-title{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.up-sub{font-size:11.5px;color:var(--mu);margin-top:2px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.up-pill{font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;white-space:nowrap;flex-shrink:0}
.upc-past{background:rgba(74,222,128,.1);color:var(--cd)}
.upc-soon{background:rgba(251,113,133,.1);color:var(--cr)}
.upc-near{background:rgba(251,191,36,.1);color:var(--ch)}
.upc-far{background:var(--surf3);color:var(--mu)}

/* ── FORM ── */
.form-wrap{padding:16px 18px;flex:1;overflow-y:auto;min-height:0}
.form-footer{padding:14px 18px;border-top:1px solid var(--brd);display:flex;gap:8px;justify-content:flex-end;background:var(--surf);flex-shrink:0}
.fg{margin-bottom:14px}
.fg-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.flbl{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;color:var(--tx2);margin-bottom:5px;display:block}
.fin{background:var(--surf2);border:1px solid var(--brd);border-radius:var(--rs);padding:8px 10px;font-size:13.5px;color:var(--tx);outline:none;width:100%;transition:border-color .15s}
.fin:focus{border-color:var(--g)}
textarea.fin{resize:vertical;min-height:68px}
.f-sec-hd{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.8px;color:var(--mu);margin:14px 0 8px;padding-top:14px;border-top:1px solid var(--brd)}
.btn-save{background:var(--g);color:#fff;border-radius:var(--rs);padding:8px 20px;font-size:13px;font-weight:700;transition:opacity .15s}
.btn-save:hover{opacity:.85}
.btn-cancel{background:var(--surf2);color:var(--tx2);border:1px solid var(--brd);border-radius:var(--rs);padding:8px 16px;font-size:13px;font-weight:500;transition:all .15s}
.btn-cancel:hover{background:var(--surf3)}
.btn-del-entry{background:rgba(251,113,133,.08);color:var(--cr);border:1px solid rgba(251,113,133,.2);border-radius:var(--rs);padding:8px 16px;font-size:13px;font-weight:600;transition:all .15s;margin-right:auto}
.btn-del-entry:hover{background:rgba(251,113,133,.14)}

/* ── FORM TIMELINE ── */
.ftl-item{background:var(--surf2);border:1px solid var(--brd);border-radius:var(--rs);padding:10px;margin-bottom:6px;position:relative}
.ftl-item.drag-over{border-color:var(--g);background:var(--gs)}
.ftl-item.dragging{opacity:.4}
.ftl-head{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.ftl-type{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;padding:2px 8px;border-radius:3px}
.ftl-drag{color:var(--mu);cursor:grab;font-size:14px;padding:0 4px}
.ftl-rm{position:absolute;top:8px;right:8px;width:22px;height:22px;border-radius:4px;background:none;border:1px solid var(--brd);color:var(--mu);font-size:12px;display:flex;align-items:center;justify-content:center;transition:all .12s}
.ftl-rm:hover{background:rgba(251,113,133,.1);color:var(--cr);border-color:rgba(251,113,133,.3)}
.ftl-add-row{display:flex;gap:8px;margin-top:8px}
.ftl-add-btn{flex:1;padding:8px;border:1px dashed var(--brd);border-radius:var(--rs);font-size:12px;color:var(--mu);text-align:center;background:none;transition:all .12s}
.ftl-add-btn:hover{border-color:var(--g);color:var(--g);background:var(--gs)}

/* ── MISC ── */
.page-ttl{font-family:'Cinzel',serif;font-size:18px;font-weight:600;margin-bottom:16px}
.page-ttl span{color:var(--g)}
.empty{text-align:center;padding:50px 20px;color:var(--mu)}
.empty-ico{font-size:32px;opacity:.35;margin-bottom:10px}

/* ── DRIVE STATUS ── */
#drive-btn.synced{color:var(--cd)!important}
#drive-btn.syncing{color:var(--ch)!important}
#drive-btn.pending{color:var(--ch)!important}
#drive-btn.error{color:var(--cr)!important}
</style>
</head>
<body>
<div id="app">
  <nav id="navbar">
    <div class="nav-left">
      <div class="logo">The <em>Aether Codex</em></div>
      <div class="gdrop" id="gdrop">
        <button class="gdrop-btn" onclick="toggleGdrop(event)">
          <span class="gdot" id="gdot"></span>
          <span id="gdrop-lbl">Anime</span>
          <span style="font-size:10px">▾</span>
        </button>
        <div class="gdrop-menu" id="gdrop-menu"></div>
      </div>
      <button class="ntab active" id="tab-list" onclick="setPage('list')">List</button>
      <button class="ntab" id="tab-dash" onclick="setPage('dash')">Dashboard</button>
      <button class="ntab" id="tab-up" onclick="setPage('up')">Upcoming</button>
      <button class="ntab" id="tab-inc" onclick="setPage('inc')">Incomplete</button>
    </div>
    <div class="nav-right">
      <input type="text" class="search-inp" id="sinp" placeholder="Search..." oninput="onSrch(this.value)">
      <button class="icon-btn" id="drive-btn" onclick="driveAction()" title="Connect to Google Drive">☁ Drive</button>
      <button class="icon-btn" onclick="exportData()" title="Export backup">⬇ Export</button>
      <button class="icon-btn" onclick="importFromFile()" title="Import backup">⬆ Import</button>
      <button class="add-btn" onclick="openAdd()">+ Add</button>
      <button class="theme-btn" onclick="toggleTheme()" id="tbtn">☀</button>
    </div>
  </nav>
  <div id="filterbar">
    <select class="fsel" id="fstatus" onchange="render()">
      <option value="">All Status</option>
      <option value="watching">Watching</option>
      <option value="plan">Plan to Watch</option>
      <option value="not_started">Not Started</option>
      <option value="completed">Completed</option>
      <option value="on_hold">On Hold</option>
      <option value="dropped">Dropped</option>
      <option value="upcoming">Upcoming</option>
    </select>
    <select class="fsel" id="fsort" onchange="render()">
      <option value="title">A → Z</option>
      <option value="added">Recently Added</option>
    </select>
    <span class="count-lbl" id="cnt-lbl"></span>
  </div>
  <div id="main-wrap">
    <div id="content"></div>
  </div>
  <div id="poverlay" onclick="closePanel()"></div>
  <div id="rpanel"><div id="panel-inner"></div></div>
</div>

<script>
'use strict';
// ═══════════════════════════════════════════════════════
//  CONSTANTS & STORAGE
// ═══════════════════════════════════════════════════════
const K = {
  DATA:    'ac_data',
  GENRES:  'ac_genres',
  THEME:   'ac_theme',
  GENRE:   'ac_genre',
  VER:     'ac_ver',
  SAVED:   'ac_saved_at',
  DTOKEN:  'ac_drive_token',
  DEXP:    'ac_drive_token_exp',
  DFILEID: 'ac_drive_file_id',

function uid()     { return Date.now().toString(36) + Math.random().toString(36).slice(2); }
function esc(s)    { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function today()   { return new Date().toISOString().slice(0,10); }
function fmtDate(d){ if(!d) return '—'; const dt = new Date(d+'T00:00:00'); return dt.toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'}); }
function h2r(hex,a){ const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16); return `rgba(${r},${g},${b},${a})`; }
function gbyid(id) { return GENRES.find(g=>g.id===id) || GENRES[0]; }

function estTime(eps, durMin) {
  if (!eps) return '—';
  const tot = eps * ((parseInt(durMin)||24) / 60);
  const h = Math.floor(tot), m = Math.round((tot-h)*60);
  return h ? `~${h}h${m>0?' '+m+'m':''}` : `~${m}m`;
}

function fmtTime(min) {
  if (!min) return '—';
  const d = Math.floor(min/1440), h = Math.floor((min%1440)/60), m = min%60;
  if (d > 0) return `${d}d ${h}h`;
  if (h > 0) return `${h}h${m>0?' '+m+'m':''}`;
  return `${m}m`;
}

function entryStats(e) {
  const tl = e.timeline || [];
  const dur = parseInt(e.epDuration) || 24;
  if (!tl.length) {
    const cur = parseInt(e.epCur)||0, tot = parseInt(e.epTot)||0;
    const pct = tot ? Math.round(cur/tot*100) : (cur>0?100:0);
    return { cur, tot, pct, time: estTime(tot||cur, dur) };
  }
  let cur=0, tot=0;
  tl.forEach(it => {
    if (it.type==='season') { cur+=parseInt(it.epWatched||0); tot+=parseInt(it.eps||0); }
    else if (it.type==='movie') { if(it.watched){cur+=1;} tot+=1; }
  });
  const pct = tot ? Math.round(cur/tot*100) : 0;
  return { cur, tot, pct, time: estTime(tot, dur) };
}

function activeSeason(e) {
  const tl = (e.timeline||[]).filter(it=>it.type==='season');
  return tl.find(it=>it.status==='watching') || tl.find(it=>it.status==='not_started') || tl[tl.length-1] || null;
}

  const fst = document.getElementById('fstatus').value;

      if (!fst || e.status===fst) rows.push({kind:'entry', e, status:e.status});
    } else {
      tl.forEach((it,idx) => {
        const st = it.status || 'not_started';
        if (!fst || st===fst) rows.push({kind:'tlrow', e, it, idx, status:st});
      });
    }
  });

// ═══════════════════════════════════════════════════════
function quickEp(id, delta) {
  const e = DATA.find(x=>x.id===id); if(!e) return;
  const tl = e.timeline||[];
  if (tl.length) {
    const as = activeSeason(e);
    if (as) {
      const w = Math.max(0, parseInt(as.epWatched||0)+delta);
      as.epWatched = as.eps ? Math.min(w, parseInt(as.eps)) : w;
      if (as.eps && as.epWatched>=parseInt(as.eps) && as.status==='watching') as.status='completed';
    }
  } else {
    e.epCur = Math.max(0, (parseInt(e.epCur)||0)+delta);
    if (e.epTot && e.epCur>=parseInt(e.epTot) && e.status==='watching') { e.status='completed'; e.endDate=today(); }
  }
  e.updatedAt = Date.now();
  saveData(DATA);
  render();
  if (PANEL==='detail' && PEDIT===id) renderDetailPanel(DATA.find(x=>x.id===id));
}

function quickTlEp(eid, idx, delta) {
  const e = DATA.find(x=>x.id===eid); if(!e) return;
  const it = e.timeline&&e.timeline[idx]; if(!it||it.type!=='season') return;
  const w = Math.max(0, parseInt(it.epWatched||0)+delta);
  it.epWatched = it.eps ? Math.min(w, parseInt(it.eps)) : w;
  if (it.eps && it.epWatched>=parseInt(it.eps) && it.status==='watching') {
    it.status='completed';
    if ((e.timeline||[]).filter(t=>t.type==='season').every(s=>s.status==='completed')) e.status='completed';
  }
  e.updatedAt = Date.now();
  saveData(DATA);
  render();
  if (PANEL==='detail' && PEDIT===eid) renderDetailPanel(e);
}

function calcTotalMinutes() {
  let min = 0;
  DATA.forEach(e => {
    const tl = e.timeline||[];
    if (tl.length) {
      tl.forEach(it => {
        if (it.type==='season') min += parseInt(it.epWatched||0) * parseInt(it.epDuration||e.epDuration||24);
        else if (it.type==='movie' && it.watched) min += parseInt(it.epDuration||120);
      });
    } else {
      min += parseInt(e.epCur||0) * parseInt(e.epDuration||24);
    }
  });
  return min;
}

let UP_GENRE='', UP_STATUS='';
function renderUp(c) {
  const today_ = new Date(); today_.setHours(0,0,0,0);
  const items = [];
  DATA.forEach(e => {
    if (e.upcomingDate) items.push({id:e.id,title:e.title,genreId:e.genreId,label:'New Release',date:e.upcomingDate,time:e.upcomingTime||null});
    (e.timeline||[]).forEach(it => {
      if (it.upcomingDate) items.push({id:e.id,title:e.title,genreId:e.genreId,label:it.type==='season'?`Season ${it.num||''}`:it.movieTitle||'Movie',date:it.upcomingDate,time:it.upcomingTime||null});
    });
  });
  let filtered = items;
  if (UP_GENRE) filtered = filtered.filter(x=>x.genreId===UP_GENRE);
  if (UP_STATUS==='released') filtered = filtered.filter(x=>new Date(x.date)<today_);
  else if (UP_STATUS==='upcoming') filtered = filtered.filter(x=>new Date(x.date)>=today_);
  filtered.sort((a,b)=>new Date(a.date)-new Date(b.date));

  const gOpts = GENRES.map(g=>`<option value="${g.id}" ${UP_GENRE===g.id?'selected':''}>${esc(g.name)}</option>`).join('');
  const rows = filtered.map(it => {
    const d = new Date(it.date+'T00:00:00');
    const diff = Math.ceil((d-today_)/86400000);
    const mon = d.toLocaleString('default',{month:'short'}).toUpperCase();
    let pc='upc-far', pt=diff>0?`${diff}d`:'Today';
    if(diff<0){pc='upc-past';pt='Released';}
    else if(diff===0){pc='upc-soon';pt='Today!';}
    else if(diff<=7){pc='upc-soon';pt=`${diff}d left`;}
    else if(diff<=30){pc='upc-near';pt=`${diff}d`;}
    const g = gbyid(it.genreId);
    return `<div class="up-card" onclick="openDetail('${it.id}')">
      <div class="up-date-box"><div class="up-month">${mon}</div><div class="up-day">${d.getDate()}</div></div>
      <div class="up-info">
        <div class="up-title">${esc(it.title)}</div>
        <div class="up-sub">
          <span style="background:${h2r(g.color,.12)};color:${g.color};padding:1px 7px;border-radius:3px;font-size:10px;font-weight:700">${esc(g.name)}</span>
          <span>${esc(it.label)}</span>
          ${it.time?`<span style="color:var(--cu);font-size:10px">⏰ ${esc(it.time)}</span>`:''}
        </div>
      </div>
      <div class="up-pill ${pc}">${pt}</div>
    </div>`;
  }).join('');

  c.innerHTML = `<div class="page-ttl">Upcoming</div>
    <div style="display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap">
      <select class="fsel" onchange="UP_GENRE=this.value;renderUp(document.getElementById('content'))"><option value="">All Genres</option>${gOpts}</select>
      <select class="fsel" onchange="UP_STATUS=this.value;renderUp(document.getElementById('content'))">
        <option value="">All</option>
        <option value="upcoming" ${UP_STATUS==='upcoming'?'selected':''}>Not yet released</option>
        <option value="released" ${UP_STATUS==='released'?'selected':''}>Released</option>
      </select>
      <span class="count-lbl">${filtered.length} item${filtered.length!==1?'s':''}</span>
    </div>
    ${filtered.length?rows:'<div class="empty"><div class="empty-ico">📅</div><p>No upcoming items.</p></div>'}`;
}

// ═══════════════════════════════════════════════════════
function renderInc(c) {
  const items = DATA.filter(e => {
    const s = (e.timeline||[]).filter(t=>t.type==='season');
    return s.some(x=>x.status==='completed') && s.some(x=>['not_started','plan','watching','upcoming'].includes(x.status));
  });
  c.innerHTML = `<div class="page-ttl">⚠ Incomplete Seasons</div>` + (items.length
    ? `<div>${items.map(e=>{
        const g=gbyid(e.genreId);
        const seas=(e.timeline||[]).filter(t=>t.type==='season');
        const done=seas.filter(s=>s.status==='completed').length;
        return `<div class="row" style="margin-bottom:4px" onclick="openDetail('${e.id}')">
          <div class="row-bar" style="background:${g.color}"></div>
          <div class="row-info">
            <div class="row-title">${esc(e.title)}</div>
            <div class="row-meta">${statusTag(e.status)}<span style="font-size:10px;color:var(--mu)">${done}/${seas.length} seasons done</span></div>
          </div>
          <div class="row-right"><div class="row-btns" onclick="event.stopPropagation()"><button class="rbt" onclick="openEdit('${e.id}')">✏</button></div></div>
        </div>`;
      }).join('')}</div>`
    : '<div class="empty"><div class="empty-ico">🎉</div><p>All caught up!</p></div>');
}

function openPanel(mode, id) {
  PANEL=mode; PEDIT=id;
  document.getElementById('rpanel').classList.add('open');
  document.getElementById('poverlay').classList.add('show');
  document.getElementById('content').classList.add('panel-push');
  if (mode==='detail') { const e=DATA.find(x=>x.id===id); if(e) renderDetailPanel(e); }
  else if (mode==='add')  renderFormPanel(null);
  else if (mode==='edit') { const e=DATA.find(x=>x.id===id); if(e) renderFormPanel(e); }
}
function closePanel() {
  PANEL=null; PEDIT=null;
  document.getElementById('rpanel').classList.remove('open');
  document.getElementById('poverlay').classList.remove('show');
  document.getElementById('content').classList.remove('panel-push');
  render();
}
function openDetail(id) { openPanel('detail',id); }
function openEdit(id)   { openPanel('edit',id); }
function openAdd()      { openPanel('add',null); }

function tlViewHtml(it, i, eid, parentTitle) {
  const isS = it.type==='season';
  const isCurrent = isS && it.status==='watching';
  const w=parseInt(it.epWatched||0), t=parseInt(it.eps||0);
  const pct = t?Math.round(w/t*100):0;
  const sc = progColor(it.status);
  const rawName = isS?(it.name||`Season ${it.num||i+1}`):(it.movieTitle||it.name||'Movie');
  const fullName = `${parentTitle} · ${rawName}`;
  return `<div class="tl-item${isCurrent?' tl-current':''}${!isS?' tl-movie':''}" draggable="true" data-idx="${i}"
    ondragstart="dDragStart(event,${i})" ondragover="dDragOver(event,${i})" ondrop="dDrop(event,${i})" ondragleave="this.classList.remove('drag-over')">
    <span class="tl-drag">⠿</span>
    <span class="tl-type-pill ${isS?'tp-season':'tp-movie'}">${isS?`S${it.num||i+1}`:'🎬'}</span>
    <div class="tl-info">
      <div class="tl-name">${esc(fullName)}</div>
      <div class="tl-sub">
        ${statusTag(it.status||'not_started')}
        ${it.endDate?`<span style="font-size:10px;color:var(--cd)">✓ ${fmtDate(it.endDate)}</span>`:''}
        ${it.startDate&&!it.endDate?`<span style="font-size:10px;color:var(--mu)">Started ${fmtDate(it.startDate)}</span>`:''}
        ${it.rating?`<span style="font-size:10px;color:var(--ch)">★ ${it.rating}</span>`:''}
        ${it.upcomingDate?`<span style="font-size:10px;color:var(--cu)">📅 ${fmtDate(it.upcomingDate)}${it.upcomingTime?' '+it.upcomingTime:''}</span>`:''}
      </div>
    </div>
    <div class="tl-right">
      ${isS&&(t||w)?`<span class="tl-ep">${w}${t?'/'+t:''} ep</span><div class="mini-bar"><div class="mini-fill" style="width:${pct}%;background:${sc}"></div></div>`:''}
      ${isS&&it.status==='watching'?`<div class="ep-ctrl">
        <button class="ep-pm" onclick="panelEp('${eid}',${i},-1)">−</button>
        <span class="ep-num">${w}</span>
        <button class="ep-pm" onclick="panelEp('${eid}',${i},1)">+</button>
      </div>`:''}
    </div>
  </div>`;
}

function panelEp(eid, idx, delta) {
  const e = DATA.find(x=>x.id===eid); if(!e) return;
  const it = e.timeline[idx]; if(!it||it.type!=='season') return;
  const w = Math.max(0, (parseInt(it.epWatched||0))+delta);
  it.epWatched = it.eps ? Math.min(w, parseInt(it.eps)) : w;
  if (it.eps && it.epWatched>=parseInt(it.eps) && it.status==='watching') it.status='completed';
  e.updatedAt=Date.now(); saveData(DATA); renderDetailPanel(e); render();
}

// Detail drag
let DDRG=null;
function dDragStart(ev,i){DDRG=i;ev.currentTarget.classList.add('dragging')}
function dDragOver(ev,i){ev.preventDefault();if(DDRG===i)return;ev.currentTarget.classList.add('drag-over')}
function dDrop(ev,i){
  ev.preventDefault(); ev.currentTarget.classList.remove('drag-over');
  if(DDRG===null||DDRG===i)return;
  const e=DATA.find(x=>x.id===PEDIT); if(!e) return;
  const item=e.timeline.splice(DDRG,1)[0]; e.timeline.splice(i,0,item);
  DDRG=null; saveData(DATA); renderDetailPanel(e);
}
function initDetailDrag(e){
  document.querySelectorAll('#dtl-wrap .tl-item').forEach(el=>{
    el.addEventListener('dragend',()=>{el.classList.remove('dragging');document.querySelectorAll('.tl-item').forEach(x=>x.classList.remove('drag-over'))});
  });
}

// Form timeline CRUD
function collectFormTl() {
  const items = []; let sNum = 0;
  document.querySelectorAll('#ftl-list .ftl-item').forEach((el,i) => {
    const type = el.dataset.type||'season';
    const id   = el.dataset.id||uid();
    const isS  = type==='season';
    if(isS) sNum++;
    const get  = fi => { const x=el.querySelector(`[data-fi="${fi}"]`); return x?x.value:''; };
    const name = get('name'), status = get('status')||'not_started';
    let endDate = get('endDate')||null;
    if (status==='completed' && !endDate) endDate = today();
    items.push({ id, type, num:isS?sNum:null, name:name||null, movieTitle:!isS?(name||null):null,
      status, eps:isS?(get('eps')||null):null, epWatched:isS?(get('epWatched')||null):null,
      watched:!isS&&status==='completed',
      startDate:get('startDate')||null, endDate,
      rating:get('rating')||null, epDuration:get('epDuration')?parseInt(get('epDuration')):null,
      upcomingDate:get('upcomingDate')||null, upcomingTime:get('upcomingTime')||null,
    });
  });
  return items;
}

function addTlSeason() {
  const current = collectFormTl();
  const num = (current.filter(x=>x.type==='season').length)+1;
  // pre-fill from standalone fields if adding first season
  let prefill = {};
  if (num===1) {
    const ept=document.getElementById('f-ept'), epc=document.getElementById('f-epc');
    if(ept&&ept.value) {
      prefill = {
        eps:ept.value||null, epWatched:epc?epc.value||null:null,
        startDate:document.getElementById('f-start')?.value||null,
        endDate:document.getElementById('f-end')?.value||null,
        rating:document.getElementById('f-rating')?.value||null,
        epDuration:document.getElementById('f-epdur')?.value?parseInt(document.getElementById('f-epdur').value):null,
        status:document.getElementById('f-status')?.value||'not_started',
      };
    }
  }
  current.push({id:uid(),type:'season',num,name:`Season ${num}`,status:prefill.status||'not_started',
    eps:prefill.eps||null,epWatched:prefill.epWatched||null,
    startDate:prefill.startDate||null,endDate:prefill.endDate||null,
    rating:prefill.rating||null,epDuration:prefill.epDuration||null,
    upcomingDate:null,upcomingTime:null});
  FORM_TL=current; refreshFtl();
}

function addTlMovie() {
  const current = collectFormTl();
  current.push({id:uid(),type:'movie',movieTitle:'',name:'',status:'not_started',watched:false,upcomingDate:null,upcomingTime:null});
  FORM_TL=current; refreshFtl();
}

function removeTlItem(i) { const c=collectFormTl(); c.splice(i,1); FORM_TL=c; refreshFtl(); }
function refreshFtl()    { document.getElementById('ftl-list').innerHTML=FORM_TL.map((it,i)=>tlFormHtml(it,i)).join(''); }

// Form drag
let FDRG=null;
function fDragStart(ev,i){FDRG=i;ev.currentTarget.classList.add('dragging')}
function fDragOver(ev,i){ev.preventDefault();if(FDRG===i)return;document.querySelectorAll('.ftl-item').forEach(x=>x.classList.remove('drag-over'));ev.currentTarget.classList.add('drag-over')}
function fDrop(ev,i){
  ev.preventDefault(); document.querySelectorAll('.ftl-item').forEach(x=>x.classList.remove('drag-over','dragging'));

}

function saveEntry(eid) {
  const title = document.getElementById('f-title').value.trim();
  if (!title) { alert('Please enter a title'); return; }
  const existing = eid ? DATA.find(x=>x.id===eid) : null;
  const tl = collectFormTl();
  const g = (f,fb) => { const el=document.getElementById(f); return el?el.value||null:(fb!==undefined?fb:null); };
  const entry = {
    id: eid||uid(), title,
    genreId:   g('f-genre'),
    status:    g('f-status'),
    epCur:     g('f-epc',    existing?.epCur),
    epTot:     g('f-ept',    existing?.epTot),
    startDate: g('f-start',  existing?.startDate),
    endDate:   g('f-end',    existing?.endDate),
    rating:    g('f-rating', existing?.rating),
    epDuration:document.getElementById('f-epdur')?.value ? parseInt(document.getElementById('f-epdur').value) : (existing?.epDuration||null),
    upcomingDate: existing?.upcomingDate||null,
    upcomingTime: existing?.upcomingTime||null,
    notes:     g('f-notes'),
    timeline:  tl,
    addedAt:   existing?existing.addedAt:Date.now(),
    updatedAt: Date.now(),
  };
  if (entry.status==='completed' && !entry.endDate && !tl.length) entry.endDate = today();
  if (eid) { const i=DATA.findIndex(x=>x.id===eid); DATA[i]=entry; }
  else DATA.unshift(entry);
  saveData(DATA); closePanel(); render();
}

function exportData() {
  const payload = { version:DATA_VERSION, exported:new Date().toISOString(), data:DATA, genres:GENRES };
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([JSON.stringify(payload,null,2)],{type:'application/json'}));
  a.download = 'AetherCodex_backup_' + new Date().toISOString().slice(0,10) + '.json';
  a.click(); URL.revokeObjectURL(a.href);
  toast('✓ Backup exported', 'var(--cd)');
}

function importFromFile() {
  const inp = document.createElement('input');
  inp.type='file'; inp.accept='.json';
  inp.onchange = e => {
    const file = e.target.files[0]; if(!file) return;
    const r = new FileReader();
    r.onload = ev => {
      try {
        const payload = JSON.parse(ev.target.result);
        if (!payload.data||!Array.isArray(payload.data)) throw new Error('Invalid file');
        if (!confirm(`Import ${payload.data.length} entries? This will merge with your current data.`)) return;
        const existingIds = new Set(DATA.map(x=>x.id));
        const fresh = payload.data.filter(x=>!existingIds.has(x.id));
        DATA = DATA.concat(fresh); saveData(DATA);
        if (payload.genres) {
          const gids = new Set(GENRES.map(g=>g.id));
          payload.genres.filter(g=>!gids.has(g.id)).forEach(g=>GENRES.push(g));
          saveGenres(GENRES);
        }
        render(); toast(`✓ Imported ${fresh.length} new entries`, 'var(--cd)');
      } catch(err) { toast('✗ Could not read file: '+err.message, 'var(--cr)'); }
    };
    r.readAsText(file);
  };
  inp.click();
}

// ═══════════════════════════════════════════════════════
//  GOOGLE DRIVE SYNC
// ═══════════════════════════════════════════════════════
let gisReady = false;
let tokenClient = null;
let driveFileId = ls.str(K.DFILEID) || null;
let syncTimer = null;

function getToken()   { return Date.now() < parseInt(ls.str(K.DEXP)||'0') ? ls.str(K.DTOKEN) : null; }
function isConnected(){ return !!getToken(); }

function initGIS() {
  if (!window.google?.accounts?.oauth2) { setTimeout(initGIS, 500); return; }
  tokenClient = google.accounts.oauth2.initTokenClient({
    client_id: CLIENT_ID,
    scope: DRIVE_SCOPE,
    callback: onToken,
  });
  gisReady = true;
  if (isConnected()) { updateDriveBtn(); initDriveSync(); }
  else updateDriveBtn();
}

function onToken(resp) {
  if (resp.error) { toast('Drive auth failed: '+resp.error, 'var(--cr)'); updateDriveBtn(); return; }
  ls.setStr(K.DTOKEN, resp.access_token);
  ls.setStr(K.DEXP,   String(Date.now() + (resp.expires_in-60)*1000));
  updateDriveBtn('syncing');
  initDriveSync();
}

function driveAction() {
  if (isConnected()) {
    // Show disconnect option
    if (confirm('Google Drive is connected. Click OK to disconnect.')) {
      google.accounts.oauth2.revoke(getToken());
      ls.del(K.DTOKEN); ls.del(K.DEXP); ls.del(K.DFILEID); ls.del(K.DSYNC);
      driveFileId = null;
      updateDriveBtn();
      toast('Disconnected from Drive');
    }
  } else {
    if (!gisReady) { toast('Google API loading, try again in a moment', 'var(--ch)'); return; }
    tokenClient.requestAccessToken();
  }
}

async function driveRequest(url, opts={}) {
  const token = getToken(); if(!token) return null;
  const resp = await fetch(url, { ...opts, headers: { Authorization:`Bearer ${token}`, ...(opts.headers||{}) } });
  if (resp.status===401) { ls.del(K.DTOKEN); ls.del(K.DEXP); updateDriveBtn(); return null; }
  return resp;
}

async function findOrCreateFile() {
  const search = await driveRequest(`https://www.googleapis.com/drive/v3/files?q=name='${DRIVE_FILE}'+and+trashed=false&fields=files(id,modifiedTime)`);
  if (!search) return null;
  const data = await search.json();
  if (data.files?.length) { driveFileId=data.files[0].id; ls.setStr(K.DFILEID,driveFileId); return driveFileId; }
  const create = await driveRequest('https://www.googleapis.com/drive/v3/files', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({name:DRIVE_FILE, mimeType:'application/json'})
  });
  if (!create) return null;
  const file = await create.json();
  driveFileId = file.id; ls.setStr(K.DFILEID, driveFileId);
  return driveFileId;
}

async function pushToDrive() {
  updateDriveBtn('syncing');
  try {
    if (!driveFileId) await findOrCreateFile();
    if (!driveFileId) throw new Error('Could not create Drive file');
    const payload = JSON.stringify({ version:DATA_VERSION, savedAt:parseInt(ls.str(K.SAVED)||'0'), data:DATA, genres:GENRES });
    await driveRequest(`https://www.googleapis.com/upload/drive/v3/files/${driveFileId}?uploadType=media`, {
      method:'PATCH', headers:{'Content-Type':'application/json'}, body:payload
    });
    ls.setStr(K.DSYNC, String(Date.now()));
    updateDriveBtn('synced');
  } catch(e) { updateDriveBtn('error'); toast('Drive sync failed: '+e.message, 'var(--cr)'); }
}

async function pullFromDrive() {
  try {
    if (!driveFileId) await findOrCreateFile();
    if (!driveFileId) return null;
    const resp = await driveRequest(`https://www.googleapis.com/drive/v3/files/${driveFileId}?alt=media`);
    if (!resp||!resp.ok) return null;
    return await resp.json();
  } catch { return null; }
}

async function initDriveSync() {
  updateDriveBtn('syncing');
  const driveData = await pullFromDrive();
  if (!driveData) { await pushToDrive(); return; }

  const localSaved  = parseInt(ls.str(K.SAVED)||'0');
  const driveSaved  = driveData.savedAt || 0;

  if (driveSaved > localSaved) {
    // Drive is newer → load from Drive
    DATA   = driveData.data   || DATA;
    GENRES = driveData.genres || GENRES;
    saveData(DATA); saveGenres(GENRES);
    applyGenre(GACTIVE); render();
    toast('✓ Loaded latest data from Drive', 'var(--cd)');
    updateDriveBtn('synced');
  } else if (localSaved > driveSaved) {
    // Local is newer → push to Drive
    await pushToDrive();
  } else {
    updateDriveBtn('synced');
  }
}

function scheduleDriveSync() {
  if (!isConnected()) return;
  clearTimeout(syncTimer);
  updateDriveBtn('pending');
  syncTimer = setTimeout(pushToDrive, 3000);
}

function updateDriveBtn(state) {
  const btn = document.getElementById('drive-btn'); if(!btn) return;
  btn.className = 'icon-btn';
  if (!isConnected() && state!=='syncing') {
    btn.textContent='☁ Drive'; btn.style.color=''; btn.title='Connect to Google Drive'; return;
  }
  const map = {
    syncing: ['↻ Syncing', 'var(--ch)', 'Syncing to Drive...'],
    synced:  ['✓ Drive',   'var(--cd)', 'Synced with Drive · click to disconnect'],
    pending: ['… Drive',   'var(--ch)', 'Changes pending...'],
    error:   ['✗ Drive',   'var(--cr)', 'Sync error · click to retry'],
  };
  const [label,color,title] = map[state] || map.synced;
  btn.textContent=label; btn.style.color=color; btn.title=title;
}
