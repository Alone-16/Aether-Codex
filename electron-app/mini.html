<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quick Clipboard</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --ac:     #34d399;
  --ac-rgb: 52,211,153;
  --bg:     #070d0b;
  --surf:   #0d1512;
  --surf2:  #121f1a;
  --surf3:  #172620;
  --brd:    #1e3329;
  --brd2:   #2a4a3a;
  --tx:     #e8f5f0;
  --tx2:    #7aab95;
  --mu:     #3a5a4a;
  --fd:     'Cinzel', serif;
  --fb:     'Outfit', sans-serif;
}

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--tx);
  font-family: var(--fb);
  font-size: 13px;
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
  user-select: none;
}

/* ── Titlebar (draggable) ── */
#titlebar {
  -webkit-app-region: drag;
  height: 36px;
  background: var(--surf);
  border-bottom: 1px solid var(--brd);
  display: flex;
  align-items: center;
  padding: 0 8px 0 12px;
  gap: 7px;
  flex-shrink: 0;
}

.tb-logo {
  font-family: var(--fd);
  font-size: 11px;
  font-weight: 700;
  color: var(--ac);
  letter-spacing: .5px;
  text-shadow: 0 0 10px rgba(52,211,153,.2);
}

.tb-sep { width: 1px; height: 13px; background: var(--brd); }

.tb-label {
  flex: 1;
  font-size: 11px;
  font-weight: 500;
  color: var(--tx2);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.tb-btns {
  -webkit-app-region: no-drag;
  display: flex;
  gap: 3px;
}

.tb-btn {
  -webkit-app-region: no-drag;
  width: 22px;
  height: 22px;
  border-radius: 50%;
  background: var(--surf2);
  border: 1px solid var(--brd);
  color: var(--tx2);
  font-size: 10px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all .15s;
}

.tb-btn.open:hover  { background: rgba(var(--ac-rgb),.12); color: var(--ac); border-color: rgba(var(--ac-rgb),.3); }
.tb-btn.close:hover { background: rgba(251,113,133,.12); color: #fb7185; border-color: rgba(251,113,133,.3); }

/* ── Tabs ── */
#tabbar {
  -webkit-app-region: no-drag;
  display: flex;
  gap: 2px;
  padding: 6px 10px 0;
  background: var(--surf);
  border-bottom: 1px solid var(--brd);
  flex-shrink: 0;
}

.tab {
  -webkit-app-region: no-drag;
  padding: 4px 11px 5px;
  border-radius: 5px 5px 0 0;
  font-size: 10px;
  font-weight: 600;
  letter-spacing: .3px;
  color: var(--mu);
  cursor: pointer;
  background: transparent;
  border: none;
  font-family: var(--fb);
  transition: color .15s;
  text-transform: uppercase;
}

.tab:hover { color: var(--tx2); }
.tab.active { color: var(--ac); background: var(--bg); border-bottom: 1px solid var(--bg); margin-bottom: -1px; }

/* ── Layout ── */
#app { display: flex; flex-direction: column; height: 100vh; }

/* ── Sticky badge ── */
#sync-badge {
  -webkit-app-region: no-drag;
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 4px 12px;
  background: rgba(var(--ac-rgb),.04);
  border-bottom: 1px solid rgba(var(--ac-rgb),.1);
  font-size: 9px;
  font-weight: 600;
  color: var(--mu);
  letter-spacing: .3px;
  flex-shrink: 0;
}

#sync-badge.hidden { display: none; }

.badge-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--ac);
  opacity: .5;
  flex-shrink: 0;
}

/* ── Editor ── */
#editor-wrap {
  -webkit-app-region: no-drag;
  flex: 1;
  display: flex;
  flex-direction: column;
  padding: 10px 12px 6px;
  min-height: 0;
}

#editor {
  flex: 1;
  width: 100%;
  background: transparent;
  border: none;
  outline: none;
  color: var(--tx);
  font-family: var(--fb);
  font-size: 13px;
  line-height: 1.7;
  resize: none;
  caret-color: var(--ac);
  user-select: text;
  min-height: 0;
  tab-size: 2;
}

#editor::placeholder { color: var(--mu); }
#editor::selection   { background: rgba(var(--ac-rgb),.2); }

/* ── History list ── */
#history-wrap {
  -webkit-app-region: no-drag;
  flex: 1;
  overflow-y: auto;
  padding: 8px 10px;
  display: none;
  flex-direction: column;
  gap: 4px;
}

.hist-item {
  background: var(--surf);
  border: 1px solid var(--brd);
  border-radius: 5px;
  padding: 7px 9px;
  cursor: pointer;
  transition: border-color .12s;
  display: flex;
  align-items: flex-start;
  gap: 8px;
  user-select: none;
}

.hist-item:hover { border-color: var(--brd2); }

.hist-text {
  flex: 1;
  min-width: 0;
  font-size: 11px;
  color: var(--tx2);
  line-height: 1.5;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.hist-copy {
  flex-shrink: 0;
  height: 20px;
  border-radius: 3px;
  background: rgba(var(--ac-rgb),.1);
  border: 1px solid rgba(var(--ac-rgb),.25);
  color: var(--ac);
  font-size: 9px;
  font-weight: 700;
  padding: 0 7px;
  cursor: pointer;
  font-family: var(--fb);
  text-transform: uppercase;
  letter-spacing: .3px;
  transition: all .12s;
}

.hist-copy:hover { background: rgba(var(--ac-rgb),.2); }

/* ── Bottom bar ── */
#bottombar {
  -webkit-app-region: no-drag;
  height: 36px;
  background: var(--surf);
  border-top: 1px solid var(--brd);
  display: flex;
  align-items: center;
  padding: 0 8px;
  gap: 3px;
  flex-shrink: 0;
}

.ac-btn {
  -webkit-app-region: no-drag;
  height: 22px;
  border-radius: 4px;
  border: 1px solid var(--brd);
  background: var(--surf2);
  color: var(--tx2);
  font-family: var(--fb);
  font-size: 10px;
  font-weight: 600;
  padding: 0 8px;
  cursor: pointer;
  transition: all .12s;
  display: flex;
  align-items: center;
  gap: 3px;
  white-space: nowrap;
  text-transform: uppercase;
  letter-spacing: .2px;
}

.ac-btn:hover            { background: var(--surf3); color: var(--tx); border-color: var(--brd2); }
.ac-btn.primary          { background: rgba(var(--ac-rgb),.1); border-color: rgba(var(--ac-rgb),.3); color: var(--ac); }
.ac-btn.primary:hover    { background: rgba(var(--ac-rgb),.2); }
.ac-btn.danger:hover     { background: rgba(251,113,133,.1); color: #fb7185; border-color: rgba(251,113,133,.3); }
.ac-btn:disabled         { opacity: .35; cursor: not-allowed; }

.bar-sep { width: 1px; height: 14px; background: var(--brd); flex-shrink: 0; margin: 0 2px; }

#meta {
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 7px;
  font-size: 9px;
  color: var(--mu);
  white-space: nowrap;
  font-weight: 600;
  letter-spacing: .3px;
}

#save-ind {
  font-size: 9px;
  color: var(--ac);
  opacity: 0;
  transition: opacity .3s;
  letter-spacing: .3px;
}
#save-ind.show { opacity: 1; }

/* ── Toast ── */
#toast {
  position: fixed;
  bottom: 44px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--surf);
  border: 1px solid var(--brd2);
  border-radius: 5px;
  padding: 5px 13px;
  font-size: 11px;
  font-weight: 500;
  color: var(--tx);
  opacity: 0;
  pointer-events: none;
  transition: opacity .2s;
  white-space: nowrap;
  z-index: 999;
}
#toast.show { opacity: 1; }

/* ── Scrollbar ── */
::-webkit-scrollbar       { width: 3px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--brd2); border-radius: 2px; }

/* ── Keyboard hints ── */
#hints {
  -webkit-app-region: no-drag;
  display: flex;
  gap: 10px;
  padding: 4px 12px;
  background: rgba(var(--ac-rgb),.04);
  border-bottom: 1px solid rgba(var(--ac-rgb),.1);
  flex-shrink: 0;
  overflow: hidden;
  transition: max-height .4s, opacity .4s, padding .4s;
}
#hints.hidden { display: none; }

.hint { display: flex; align-items: center; gap: 3px; font-size: 9px; color: var(--mu); white-space: nowrap; }

kbd {
  background: var(--surf2);
  border: 1px solid var(--brd2);
  border-radius: 3px;
  padding: 1px 4px;
  font-family: monospace;
  font-size: 8px;
  color: var(--tx2);
}
</style>
</head>
<body>
<div id="app">

  <!-- Titlebar -->
  <div id="titlebar">
    <span class="tb-logo">AC</span>
    <span class="tb-sep"></span>
    <span class="tb-label" id="tb-label">Quick Clipboard</span>
    <div class="tb-btns">
      <button class="tb-btn open"  onclick="openMain()"   title="Open full app (⌂)">⌂</button>
      <button class="tb-btn close" onclick="hideWindow()" title="Close (Esc)">✕</button>
    </div>
  </div>

  <!-- Tabs -->
  <div id="tabbar">
    <button class="tab active" data-tab="sticky"  onclick="switchTab(this)">📌 Sticky</button>
    <button class="tab"        data-tab="scratch"  onclick="switchTab(this)">✏ Scratch</button>
    <button class="tab"        data-tab="history"  onclick="switchTab(this)">⌛ History</button>
  </div>

  <!-- Sticky sync badge (shown on sticky tab only) -->
  <div id="sync-badge">
    <div class="badge-dot"></div>
    AUTO-COPIES TO CLIPBOARD ON CLOSE
  </div>

  <!-- Keyboard hints (disappear after first open) -->
  <div id="hints">
    <span class="hint"><kbd>Esc</kbd> close</span>
    <span class="hint"><kbd>Ctrl+Enter</kbd> copy&amp;close</span>
    <span class="hint"><kbd>Ctrl+Shift+C</kbd> copy</span>
    <span class="hint"><kbd>Ctrl+Shift+V</kbd> paste over</span>
  </div>

  <!-- Editor (sticky + scratch) -->
  <div id="editor-wrap">
    <textarea id="editor" spellcheck="true" placeholder="Type or paste something…"></textarea>
  </div>

  <!-- History list (shown on history tab) -->
  <div id="history-wrap"></div>

  <!-- Bottom bar -->
  <div id="bottombar">
    <button class="ac-btn primary" onclick="copyText()"  title="Ctrl+Shift+C">⎘ Copy</button>
    <button class="ac-btn"         onclick="pasteText()" title="Ctrl+Shift+V">⎘ Paste</button>
    <div class="bar-sep"></div>
    <button class="ac-btn danger"  onclick="clearText()"                      >✕ Clear</button>
    <div id="meta">
      <span id="save-ind">✓ Saved</span>
      <span id="word-count">0w</span>
      <span id="char-count">0ch</span>
    </div>
  </div>

</div>

<div id="toast"></div>

<script>
'use strict';

const { clipboard, ipcRenderer } = require('electron');

// ── Storage keys ──
const KEY_STICKY  = 'ac_mini_sticky';
const KEY_HISTORY = 'ac_mini_history';
const KEY_HINTS   = 'ac_mini_hints_seen';

// ── Elements ──
const editor    = document.getElementById('editor');
const wordEl    = document.getElementById('word-count');
const charEl    = document.getElementById('char-count');
const saveInd   = document.getElementById('save-ind');
const syncBadge = document.getElementById('sync-badge');
const hintsBar  = document.getElementById('hints');
const tbLabel   = document.getElementById('tb-label');

// ── State ──
let currentTab = 'sticky';
let history    = loadHistory();
let saveTimer  = null;
let toastTimer = null;

// ═══════════════════════════════════════════════════════
//  HISTORY
// ═══════════════════════════════════════════════════════
function loadHistory() {
  try { return JSON.parse(localStorage.getItem(KEY_HISTORY)) || []; }
  catch { return []; }
}

function pushHistory(text) {
  if (!text || !text.trim()) return;
  history = history.filter(h => h !== text);
  history.unshift(text);
  if (history.length > 30) history = history.slice(0, 30);
  localStorage.setItem(KEY_HISTORY, JSON.stringify(history));
}

// ═══════════════════════════════════════════════════════
//  TAB SWITCHING
// ═══════════════════════════════════════════════════════
function switchTab(btn) {
  // Save sticky before leaving
  if (currentTab === 'sticky') saveSticky();

  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  currentTab = btn.dataset.tab;

  // Show/hide elements depending on tab
  const isHistory = currentTab === 'history';
  document.getElementById('editor-wrap').style.display  = isHistory ? 'none' : 'flex';
  document.getElementById('history-wrap').style.display = isHistory ? 'flex' : 'none';
  syncBadge.classList.toggle('hidden', currentTab !== 'sticky');
  tbLabel.textContent = currentTab === 'sticky' ? 'Sticky Note' : currentTab === 'scratch' ? 'Scratch Pad' : 'Clipboard History';

  if (currentTab === 'sticky') {
    editor.value       = localStorage.getItem(KEY_STICKY) || '';
    editor.placeholder = 'Sticky note — saved between opens, auto-copies on close…';
    editor.focus();
  } else if (currentTab === 'scratch') {
    editor.value       = '';
    editor.placeholder = 'Scratch pad — resets every time you close…';
    editor.focus();
  } else {
    renderHistory();
  }

  updateMeta();
}

// ═══════════════════════════════════════════════════════
//  STICKY — auto-saves AND auto-copies to clipboard on hide
// ═══════════════════════════════════════════════════════
function saveSticky() {
  localStorage.setItem(KEY_STICKY, editor.value);
}

// Called by hideWindow() before closing
function onBeforeHide() {
  if (currentTab === 'sticky' && editor.value.trim()) {
    saveSticky();
    // Auto-copy sticky content to system clipboard
    clipboard.writeText(editor.value);
    pushHistory(editor.value);
  }
}

// ═══════════════════════════════════════════════════════
//  HISTORY LIST
// ═══════════════════════════════════════════════════════
function renderHistory() {
  const wrap = document.getElementById('history-wrap');
  if (!history.length) {
    wrap.innerHTML = '<div style="color:var(--mu);font-size:12px;text-align:center;padding:20px 0;user-select:none">No history yet — copy something first</div>';
    return;
  }
  wrap.innerHTML = history.map((h, i) => `
    <div class="hist-item" onclick="reuseHistory(${i})">
      <span class="hist-text">${escHtml(h.slice(0, 120))}${h.length > 120 ? '…' : ''}</span>
      <button class="hist-copy" onclick="event.stopPropagation();copyHistItem(${i})">Copy</button>
    </div>`).join('');
}

function reuseHistory(i) {
  const text = history[i];
  // Switch to scratch and pre-fill
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelector('[data-tab="scratch"]').classList.add('active');
  currentTab = 'scratch';
  syncBadge.classList.add('hidden');
  tbLabel.textContent = 'Scratch Pad';
  document.getElementById('history-wrap').style.display = 'none';
  document.getElementById('editor-wrap').style.display  = 'flex';
  editor.value = text;
  updateMeta();
  editor.focus();
}

function copyHistItem(i) {
  clipboard.writeText(history[i]);
  showToast('✓ Copied from history');
}

// ═══════════════════════════════════════════════════════
//  EDITOR EVENTS
// ═══════════════════════════════════════════════════════
editor.addEventListener('input', () => {
  updateMeta();
  if (currentTab === 'sticky') scheduleSave();
});

function updateMeta() {
  const v = editor.value;
  wordEl.textContent = `${v.trim() ? v.trim().split(/\s+/).length : 0}w`;
  charEl.textContent = `${v.length}ch`;
}

function scheduleSave() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => {
    saveSticky();
    saveInd.classList.add('show');
    setTimeout(() => saveInd.classList.remove('show'), 1400);
  }, 600);
}

// ═══════════════════════════════════════════════════════
//  ACTIONS
// ═══════════════════════════════════════════════════════
function copyText() {
  const text = editor.value;
  if (!text) { showToast('Nothing to copy'); return; }
  clipboard.writeText(text);
  pushHistory(text);
  showToast('✓ Copied to clipboard');
}

function pasteText() {
  const text = clipboard.readText();
  if (!text) { showToast('Clipboard is empty'); return; }
  const s = editor.selectionStart, e = editor.selectionEnd;
  editor.value = editor.value.slice(0, s) + text + editor.value.slice(e);
  editor.selectionStart = editor.selectionEnd = s + text.length;
  editor.dispatchEvent(new Event('input'));
  editor.focus();
}

function clearText() {
  if (!editor.value) return;
  editor.value = '';
  updateMeta();
  if (currentTab === 'sticky') saveSticky();
  editor.focus();
  showToast('Cleared');
}

function hideWindow() {
  onBeforeHide();
  ipcRenderer.send('mini:hide');
}

function openMain() {
  onBeforeHide();
  ipcRenderer.send('mini:open-main');
}

// ═══════════════════════════════════════════════════════
//  KEYBOARD SHORTCUTS
// ═══════════════════════════════════════════════════════
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { e.preventDefault(); hideWindow(); return; }

  if (e.ctrlKey && e.key === 'Enter') {
    e.preventDefault(); copyText(); setTimeout(hideWindow, 120); return;
  }
  if (e.ctrlKey && e.shiftKey && e.key === 'C') { e.preventDefault(); copyText(); return; }
  if (e.ctrlKey && e.shiftKey && e.key === 'V') { e.preventDefault(); pasteText(); return; }
});

// ═══════════════════════════════════════════════════════
//  TOAST
// ═══════════════════════════════════════════════════════
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2000);
}

// ═══════════════════════════════════════════════════════
//  UTILS
// ═══════════════════════════════════════════════════════
function escHtml(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ═══════════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════════
(function init() {
  // Hide keyboard hints after first open
  if (localStorage.getItem(KEY_HINTS)) {
    hintsBar.classList.add('hidden');
  } else {
    localStorage.setItem(KEY_HINTS, '1');
    setTimeout(() => {
      hintsBar.style.maxHeight = '0';
      hintsBar.style.opacity   = '0';
      hintsBar.style.padding   = '0';
      setTimeout(() => hintsBar.classList.add('hidden'), 400);
    }, 4500);
  }

  // Load sticky tab
  editor.value       = localStorage.getItem(KEY_STICKY) || '';
  editor.placeholder = 'Sticky note — saved between opens, auto-copies on close…';
  updateMeta();
  editor.focus();
})();
</script>
</body>
</html>
